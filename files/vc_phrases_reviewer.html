        function upsertPhrase(pairId, side, topic, subtopic, phraseText, options = {}) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return null;
          const text = String(phraseText || '').trim();
          if (!text || !topic || !subtopic) return null;

          const existing = findPhraseByText(sideRow, text, options.excludeId || null);
          if (existing) {
            const moved = existing.topic !== topic || existing.subtopic !== subtopic;
            existing.topic = topic;
            existing.subtopic = subtopic;
            existing.modified = true;
            if (moved) bumpSidePhraseVersion(sideRow);
            if (!options.silentSelect) selectPhrase(pairId, side, existing.id, null);
            if (!options.suppressStatus) {
              if (moved) setStatus('Existing phrase reclassified.', 'good');
              else setStatus('Phrase already exists.', 'info');
            }
            return existing;
          }

          const phrase = {
            id: uid(),
            phrase: text,
            topic,
            subtopic,
            editing: false,
            selected: false,
            modified: true,
          };
          sideRow.phrases.push(phrase);
          bumpSidePhraseVersion(sideRow);
          if (!options.silentSelect) selectPhrase(pairId, side, phrase.id, null);
          if (!options.suppressStatus) {
            if (!phraseInReason(text, sideRow.reason)) setStatus('Added phrase, but it is not found in the reason text.', 'warn');
            else setStatus('Phrase added.', 'good');
          }
          return phrase;
        }

        function addPhrase(pairId, side, topic, subtopic, phraseText) {
          return upsertPhrase(pairId, side, topic, subtopic, phraseText);
        }

        function movePhraseToSubtopic(fromPairId, fromSide, phraseId, toPairId, toSide, topic, subtopic) {
          if (fromPairId !== toPairId || fromSide !== toSide) {
            setStatus('A phrase chip can only be moved within the same row/side.', 'warn');
            return;
          }
          const sideRow = getSide(fromPairId, fromSide);
          const phrase = findPhraseById(sideRow, phraseId);
          if (!phrase) return;
          const moved = phrase.topic !== topic || phrase.subtopic !== subtopic;
          phrase.topic = topic;
          phrase.subtopic = subtopic;
          phrase.modified = true;
          if (moved) bumpSidePhraseVersion(sideRow);
          selectPhrase(fromPairId, fromSide, phrase.id, null);
          setStatus('Phrase moved.', 'good');
        }

        function moveSelectedChipToSubtopic(pairId, side, topic, subtopic) {
          if (!state.selectedChip) return;
          if (state.selectedChip.pairId !== pairId || state.selectedChip.side !== side) return;
          movePhraseToSubtopic(state.selectedChip.pairId, state.selectedChip.side, state.selectedChip.phraseId, pairId, side, topic, subtopic);
        }

        function onDropToSubtopic(pairId, side, topic, subtopic, e) {
          const drag = getDraggedInfo(e);
          if (!drag) return;
          if (drag.kind === 'chip') {
            movePhraseToSubtopic(drag.pairId, drag.side, drag.chipId, pairId, side, topic, subtopic);
            endChipDrag();
            return;
          }
          if (!selectionAllowed(pairId, side)) {
            setStatus('Selected text must be dropped onto the same row/side it came from.', 'warn');
            return;
          }
          const draggedText = getDraggedText(e);
          addPhrase(pairId, side, topic, subtopic, draggedText);
          clearTextSelection(true);
        }

        function onSubtopicClick() { }

        function addDialogTopicOptions() { return addDialogTopicOptionsList.value; }
        function addDialogSubtopicOptions() { return addDialogSubtopicOptionsList.value; }

        function canAddTopic(pairId, side, topic) {
          if (!addAllowed(pairId, side)) return false;
          const sideRow = getSide(pairId, side);
          if (!sideRow) return false;
          return findMissingSubtopics(sideRow, topic).length > 0;
        }

        function canAddAnyTopic(pairId, side) {
          if (!addAllowed(pairId, side)) return false;
          const sideRow = getSide(pairId, side);
          if (!sideRow) return false;
          return findMissingTopics(sideRow).length > 0;
        }

        function openAddDialog(pairId, side, presetTopic = '', presetSubtopic = '', topicLocked = false, drag = null) {
          if (!addAllowed(pairId, side) && !drag) {
            setStatus('First select text from this reason, or drag a phrase chip.', 'warn');
            return;
          }
          const actualDrag = drag || getDraggedInfo(null);
          if (actualDrag?.kind === 'chip' && (actualDrag.pairId !== pairId || actualDrag.side !== side)) {
            setStatus('A phrase chip can only be moved within the same row/side.', 'warn');
            return;
          }
          state.addDialog.open = true;
          state.addDialog.pairId = pairId;
          state.addDialog.side = side;
          state.addDialog.phrase = actualDrag?.phrase || state.selectedText?.text || '';
          state.addDialog.topicLocked = !!topicLocked;
          state.addDialog.sourceChip = actualDrag?.kind === 'chip' ? actualDrag : null;

          const sideRow = getSide(pairId, side);
          const topicOptions = sideRow ? findMissingTopics(sideRow) : [];
          state.addDialog.topic = presetTopic || topicOptions[0] || '';
          const subOptions = sideRow && state.addDialog.topic ? findMissingSubtopics(sideRow, state.addDialog.topic) : [];
          state.addDialog.subtopic = presetSubtopic && subOptions.includes(presetSubtopic) ? presetSubtopic : (subOptions[0] || '');
          if (!state.addDialog.topic || !state.addDialog.subtopic) {
            state.addDialog.open = false;
            state.addDialog.sourceChip = null;
            setStatus('No available topic/subtopic for this add action.', 'warn');
          }
        }

        function confirmAddDialog() {
          const d = state.addDialog;
          if (!d.topic || !d.subtopic) {
            setStatus('No available topic/subtopic for this add action.', 'warn');
            return;
          }
          if (d.sourceChip) {
            movePhraseToSubtopic(d.sourceChip.pairId, d.sourceChip.side, d.sourceChip.chipId, d.pairId, d.side, d.topic, d.subtopic);
            endChipDrag();
          } else {
            addPhrase(d.pairId, d.side, d.topic, d.subtopic, d.phrase);
          }
          d.open = false;
          d.sourceChip = null;
          clearTextSelection(true);
        }

        function cancelAddDialog() {
          state.addDialog.open = false;
          state.addDialog.sourceChip = null;
        }

        function startChipDrag(pairId, side, chipId, e) {
          const sideRow = getSide(pairId, side);
          const chip = sideRow?.phrases.find(p => p.id === chipId);
          if (!chip) return;
          closeContextMenu();
          const dragMeta = { kind: 'chip', pairId, side, chipId, phrase: chip.phrase };
          if (e && e.dataTransfer) {
            e.dataTransfer.setData('application/x-reviewer-chip', JSON.stringify({ pairId, side, chipId }));
            e.dataTransfer.setData('text/reviewer-chip', JSON.stringify({ pairId, side, chipId }));
            e.dataTransfer.setData('text/plain', chip.phrase);
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.dropEffect = 'move'; } catch { }
            try { e.dataTransfer.setDragImage(e.currentTarget || e.target, 12, 12); } catch { }
          }
          if (e?.currentTarget?.classList) {
            e.currentTarget.classList.add('dragging');
            state._draggingChipEl = e.currentTarget;
          } else {
            state._draggingChipEl = null;
          }
          window.requestAnimationFrame(() => {
            clearTextSelection(true);
            selectPhrase(pairId, side, chipId, null);
            state.draggedChip = dragMeta;
            state.draggingChipId = chipId;
          });
          setStatus('Dragging phrase chip… drop it on another subtopic or [+].', 'info');
        }

        function endChipDrag() {
          if (state._draggingChipEl?.classList) state._draggingChipEl.classList.remove('dragging');
          state._draggingChipEl = null;
          state.draggedChip = null;
          state.draggingChipId = null;
        }

        function getDraggedInfo(e) {
          const chipRaw = String(
            e?.dataTransfer?.getData('application/x-reviewer-chip') ||
            e?.dataTransfer?.getData('text/reviewer-chip') ||
            ''
          ).trim();
          if (chipRaw) {
            try {
              const meta = JSON.parse(chipRaw);
              return { kind: 'chip', ...meta, phrase: String(e?.dataTransfer?.getData('text/plain') || '').trim() };
            } catch { }
          }
          const fromStateChip = state.draggedChip;
          if (fromStateChip) return fromStateChip;
          const fromDt = String(e?.dataTransfer?.getData('text/plain') || '').trim();
          if (fromDt) return { kind: 'text', phrase: fromDt };
          const sel = String(state.selectedText?.text || '').trim();
          if (sel) return { kind: 'text', phrase: sel };
          return null;
        }

        function getDraggedText(e) {
          return String(getDraggedInfo(e)?.phrase || '').trim();
        }

        function applyContextMenuChoice(topic, subtopic) {
          const ctx = state.contextMenu;
          if (!ctx.open) return;
          if (ctx.kind === 'phrase' && ctx.phraseId) {
            movePhraseToSubtopic(ctx.pairId, ctx.side, ctx.phraseId, ctx.pairId, ctx.side, topic, subtopic);
          } else if (ctx.kind === 'text' && ctx.text) {
            addPhrase(ctx.pairId, ctx.side, topic, subtopic, ctx.text);
            clearTextSelection(true);
          }
          closeContextMenu();
        }

        function sideImageUrl(sideRow) {
          // Cache the URL on the sideRow object
          const currentPrefix = config.imageUrlPrefix;
          if (sideRow._imgUrlCache && sideRow._imgUrlCache.prefix === currentPrefix && sideRow._imgUrlCache.name === sideRow.imgName) {
            return sideRow._imgUrlCache.url;
          }
          const url = buildImageUrl(currentPrefix, sideRow.imgName);
          sideRow._imgUrlCache = { prefix: currentPrefix, name: sideRow.imgName, url };
          return url;
        }

        async function openImageModal(sideRow) {
          const url = sideImageUrl(sideRow);
          state.imageModal.open = true;
          state.imageModal.url = url;
          state.imageModal.name = sideRow.imgName || '';
          if (state.imageModal.name) {
            try {
              await navigator.clipboard.writeText(state.imageModal.name);
              setStatus('Image name copied to clipboard.', 'good');
            } catch (err) {
              console.warn(err);
              setStatus('Opened image preview. Clipboard copy was blocked.', 'warn');
            }
          }
        }

        function closeImageModal() {
          state.imageModal.open = false;
          state.imageModal.url = '';
          state.imageModal.name = '';
        }

        function groupedForDisplay(sideRow) {
          const version = sideRow._phraseVersion || 0;
          if (sideRow._groupedCache && sideRow._groupedCache.version === version) {
            return sideRow._groupedCache.result;
          }
          const result = groupedPhrases(sideRow);
          sideRow._groupedCache = { version, result };
          return result;
        }

        function getVisibleOccurrenceCount(sideRow, phraseId) {
          return buildReasonLayout(sideRow).matches.filter(m => m.phraseId === phraseId).length;
        }

        function rangesOverlap(startA, endA, startB, endB) {
          return !(endA <= startB || startA >= endB);
        }

        function previewWouldOverlap(sideRow, preview) {
          if (!sideRow || !preview) return false;
          const range = trimRangeToContent(sideRow.reason, preview.start, preview.end);
          if (range.end <= range.start) return false;
          const layout = buildReasonLayout(sideRow);
          return layout.matches.some(m => {
            if (m.phraseId === preview.phraseId && m.occurrenceIndex === preview.occurrenceIndex) return false;
            return rangesOverlap(range.start, range.end, m.start, m.end);
          });
        }

        function applyReasonBoundaryChange(drag) {
          const sideRow = getSide(drag.pairId, drag.side);
          const phrase = findPhraseById(sideRow, drag.phraseId);
          if (!sideRow || !phrase) return;
          const range = trimRangeToContent(sideRow.reason, drag.previewStart, drag.previewEnd);
          const nextText = String(sideRow.reason.slice(range.start, range.end) || '').trim();
          if (!nextText) {
            setStatus('Phrase cannot be empty after resizing.', 'warn');
            return;
          }
          if (nextText === phrase.phrase) {
            selectPhraseOccurrenceByRange(drag.pairId, drag.side, drag.phraseId, drag.anchorStart, drag.anchorEnd);
            return;
          }

          const visibleCount = drag.visibleCount;
          const existing = findPhraseByText(sideRow, nextText, phrase.id);
          if (visibleCount <= 1) {
            if (existing) {
              removePhraseById(drag.pairId, drag.side, phrase.id, false);
              selectPhraseOccurrenceByRange(drag.pairId, drag.side, existing.id, range.start, range.end);
              setStatus('Phrase resized by reusing the existing phrase.', 'good');
              return;
            }
            phrase.phrase = nextText;
            phrase.modified = true;
            bumpSidePhraseVersion(sideRow);
            selectPhraseOccurrenceByRange(drag.pairId, drag.side, phrase.id, range.start, range.end);
            setStatus('Phrase resized.', 'good');
            return;
          }

          const target = existing || upsertPhrase(drag.pairId, drag.side, phrase.topic, phrase.subtopic, nextText, { suppressStatus: true, silentSelect: true });
          selectPhraseOccurrenceByRange(drag.pairId, drag.side, target.id, range.start, range.end);
          setStatus(existing ? 'Existing phrase reused for the resized occurrence.' : 'Created a new phrase from the resized occurrence.', 'good');
        }

        function performReasonBoundaryDragUpdate(clientX, clientY) {
          const drag = state.reasonDrag;
          if (!drag) return;
          const sideRow = getSide(drag.pairId, drag.side);
          const root = getReasonBoxEl(drag.pairId, drag.side);
          if (!sideRow || !root) return;
          const rawOffset = getCharOffsetFromPoint(root, clientX, clientY);
          if (rawOffset == null) return;
          const boundary = chooseBoundaryIndex(sideRow.reason, drag.anchorStart, drag.anchorEnd, drag.handleSide, rawOffset);
          const nextPreview = drag.handleSide === 'left'
            ? { start: boundary, end: drag.anchorEnd }
            : { start: drag.anchorStart, end: boundary };
          const trimmed = trimRangeToContent(sideRow.reason, nextPreview.start, nextPreview.end);
          if (trimmed.end <= trimmed.start) return;
          if (previewWouldOverlap(sideRow, {
            phraseId: drag.phraseId,
            occurrenceIndex: drag.occurrenceIndex,
            start: trimmed.start,
            end: trimmed.end,
          })) {
            return;
          }
          if (drag.previewStart === trimmed.start && drag.previewEnd === trimmed.end) return;
          drag.previewStart = trimmed.start;
          drag.previewEnd = trimmed.end;
        }

        // Plain (non-reactive) bookkeeping for boundary drag RAF — avoids
        // triggering Vue re-renders on every mousemove during drag.
        let _reasonDragRaf = 0;
        let _pendingReasonDragPoint = null;

        function updateReasonBoundaryDrag(e) {
          if (!state.reasonDrag || !e) return;
          _pendingReasonDragPoint = { x: e.clientX, y: e.clientY };
          if (_reasonDragRaf) return;
          _reasonDragRaf = window.requestAnimationFrame(() => {
            _reasonDragRaf = 0;
            const point = _pendingReasonDragPoint;
            _pendingReasonDragPoint = null;
            if (point) performReasonBoundaryDragUpdate(point.x, point.y);
          });
        }

        function stopReasonBoundaryDrag(applyChange = true) {
          document.removeEventListener('mousemove', updateReasonBoundaryDrag);
          document.removeEventListener('mouseup', finishReasonBoundaryDrag);
          if (_reasonDragRaf) {
            window.cancelAnimationFrame(_reasonDragRaf);
            _reasonDragRaf = 0;
          }
          _pendingReasonDragPoint = null;
          const drag = state.reasonDrag;
          state.reasonDrag = null;
          if (applyChange && drag) applyReasonBoundaryChange(drag);
        }

        function finishReasonBoundaryDrag(e) {
          if (e) {
            if (_reasonDragRaf) {
              window.cancelAnimationFrame(_reasonDragRaf);
              _reasonDragRaf = 0;
            }
            _pendingReasonDragPoint = null;
            performReasonBoundaryDragUpdate(e.clientX, e.clientY);
          }
          stopReasonBoundaryDrag(true);
        }

        function startReasonBoundaryDrag(pairId, side, phraseId, occurrenceIndex, handleSide, e) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return;
          const match = buildReasonLayout(sideRow).matches.find(m => m.phraseId === phraseId && m.occurrenceIndex === occurrenceIndex);
          if (!match) return;
          e.preventDefault();
          e.stopPropagation();
          clearTextSelection(true);
          closeContextMenu();
          selectPhrase(pairId, side, phraseId, { pairId, side, phraseId, occurrenceIndex, start: match.start, end: match.end });
          state.reasonDrag = {
            pairId,
            side,
            phraseId,
            occurrenceIndex,
            handleSide,
            anchorStart: match.start,
            anchorEnd: match.end,
            previewStart: match.start,
            previewEnd: match.end,
            visibleCount: getVisibleOccurrenceCount(sideRow, phraseId),
          };
          document.addEventListener('mousemove', updateReasonBoundaryDrag);
          document.addEventListener('mouseup', finishReasonBoundaryDrag);
        }

        function onReasonMouseDown(pairId, side, e) {
          const handleEl = e.target?.closest?.('.boundary-handle');
          if (!handleEl) return;
          const phraseEl = handleEl.closest('.reason-phrase');
          const sel = getDatasetSelectionFromPhraseEl(phraseEl, pairId, side);
          if (!sel) return;
          startReasonBoundaryDrag(pairId, side, sel.phraseId, sel.occurrenceIndex, handleEl.dataset.handleSide, e);
        }

        async function loadFromCsvText(csvText) {
          state.loading = true;
          try {
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            if (parsed.errors && parsed.errors.length) console.warn(parsed.errors);
            const rows = parsed.data || [];
            state.pairs = parseRowsToPairs(rows, config);
            _rebuildPairMap();
            state.rowsLoaded = rows.length;
            clearPhraseSelection();
            clearTextSelection();
            closeContextMenu();
            setStatus(`Loaded ${rows.length} rows.`, 'good');
          } catch (err) {
            console.error(err);
            setStatus(`Failed to parse CSV: ${err}`, 'warn');
          } finally {
            state.loading = false;
          }
        }

        async function loadFromUrl() {
          if (!String(config.spreadsheetId || '').trim() || !String(config.sheetId || '').trim()) {
            setStatus('Please provide Spreadsheet ID and Sheet ID.', 'warn');
            return;
          }
          state.loading = true;
          try {
            const rows = await loadGoogleSheetJsonp(config);
            state.pairs = parseRowsToPairs(rows, config);
            _rebuildPairMap();
            state.rowsLoaded = rows.length;
            clearPhraseSelection();
            clearTextSelection();
            closeContextMenu();
            setStatus(`Loaded ${rows.length} rows from Google Sheets.`, 'good');
          } catch (err) {
            console.error(err);
            setStatus(`Failed to load Google Sheet data: ${err}`, 'warn');
          } finally {
            state.loading = false;
          }
        }

        function exportRows() {
          return state.pairs.map(pair => {
            const row = { ...pair.originalRow };
            row[config.morePhrasesCol] = serializePhraseTree(pair.more.phrases);
            row[config.lessPhrasesCol] = serializePhraseTree(pair.less.phrases);
            return row;
          });
        }

        function exportCsvText() {
          const rows = exportRows();
          return Papa.unparse(rows);
        }

        function downloadCsv() {
          const csv = exportCsvText();
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'reviewed_phrases.csv';
          a.click();
          URL.revokeObjectURL(url);
          setStatus('CSV exported.', 'good');
        }

        async function copyPhraseJson(pairId, side) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return;
          try {
            await navigator.clipboard.writeText(serializePhraseTree(sideRow.phrases));
            flashCopiedPhraseKey(`${pairId}__${side}`);
            setStatus('Phrase JSON copied to clipboard.', 'good');
          } catch (err) {
            console.error(err);
            setStatus('Clipboard copy failed. Your browser may block clipboard access.', 'warn');
          }
        }

        async function copyCsvToClipboard() {
          const rows = exportRows();
          const tsv = Papa.unparse(rows, { delimiter: '\t', newline: '\n' });
          try {
            await navigator.clipboard.writeText(tsv);
            setStatus('Tab-delimited table copied to clipboard.', 'good');
          } catch (err) {
            console.error(err);
            setStatus('Clipboard copy failed. Your browser may block clipboard access.', 'warn');
          }
        }

        watch(() => filters.topic, (val, oldVal) => {
          if (val && !filterTopics.value.includes(val)) {
            filters.topic = '';
            return;
          }
          if (val !== oldVal) filters.subtopic = '';
        });

        watch(() => state.addDialog.topic, (val) => {
          if (!val) return;
          const subs = addDialogSubtopicOptionsList.value;
          if (!subs.includes(state.addDialog.subtopic)) state.addDialog.subtopic = subs[0] || '';
        });

        window.addEventListener('keydown', handleGlobalKeydown);
        document.addEventListener('selectionchange', handleSelectionChange);
        document.addEventListener('mouseup', handleDocumentMouseUp);

        onMounted(() => {
          nextTick(() => {
            updateFloatingLayout();
            state.lastScrollY = window.scrollY || 0;
          });
          window.addEventListener('scroll', handleWindowScroll, { passive: true });
          window.addEventListener('resize', handleWindowResize, { passive: true });
          window.addEventListener('mousemove', handleMouseNearTop, { passive: true });
        });

        onBeforeUnmount(() => {
          window.removeEventListener('scroll', handleWindowScroll);
          window.removeEventListener('resize', handleWindowResize);
          window.removeEventListener('mousemove', handleMouseNearTop);
          window.removeEventListener('keydown', handleGlobalKeydown);
          document.removeEventListener('selectionchange', handleSelectionChange);
          document.removeEventListener('mouseup', handleDocumentMouseUp);
          stopReasonBoundaryDrag(false);
          if (state._scrollRaf) {
            window.cancelAnimationFrame(state._scrollRaf);
            state._scrollRaf = 0;
          }
          if (_selChangeRaf) {
            window.cancelAnimationFrame(_selChangeRaf);
            _selChangeRaf = 0;
          }
          if (_tooltipEl && _tooltipEl.parentNode) {
            _tooltipEl.parentNode.removeChild(_tooltipEl);
            _tooltipEl = null;
          }
        });

        return {
          topPanelRef,
          filterPanelRef,
          config,
          filters,
          state,
          filterTopics,
          filterSubtopics,
          HELP_DOC,
          filteredPairs,
          TOPIC_META,
          contextMenuSubtopics,
          buildCsvUrl,
          loadFromUrl,
          openConfig,
          closeConfig,
          openHelp,
          closeHelp,
          groupedForDisplay,
          beginEditChip,
          saveEditChip,
          selectPhrase,
          isSelectedChip,
          deleteSelectedPhrase,
          sideImageUrl,
          openImageModal,
          closeImageModal,
          hoverPhrase,
          leavePhrase,
          currentHoveredText,
          chipInvalid,
          phraseChipStyle,
          renderReason,
          onReasonMouseUp,
          onReasonMouseDown,
          onReasonClick,
          onReasonContextMenu,
          onReasonMouseOver,
          onReasonMouseOut,
          onChipContextMenu,
          onDropToSubtopic,
          onSubtopicClick,
          openAddDialog,
          confirmAddDialog,
          cancelAddDialog,
          clearTextSelection,
          selectionAllowed,
          copyCsvToClipboard,
          copyPhraseJson,
          downloadCsv,
          addDialogTopicOptions,
          addDialogSubtopicOptions,
          addDialogTopicOptionsList,
          addDialogSubtopicOptionsList,
          canAddTopic,
          canAddAnyTopic,
          addAllowed,
          startChipDrag,
          endChipDrag,
          getDraggedInfo,
          closeContextMenu,
          setContextMenuTopic,
          applyContextMenuChoice,
          onAppMouseDown,
        };
      },
      template: `
        <div class="app" @mousedown.capture="onAppMouseDown">
          <div class="sticky-top" ref="topPanelRef">
            <div class="panel">
              <div class="toolbar-compact">
                <div>
                  <h2 style="margin: 0 0 4px;">Phrase Reviewer</h2>
                  <div class="hint">Single-file reviewer for more/less image reasons and nested phrase JSON.</div>
                </div>
                <div class="row">
                  <button class="btn primary" @click="loadFromUrl" :disabled="state.loading">{{ state.loading ? 'Loading...' : 'Load Google Sheet' }}</button>
                  <button class="btn" @click="downloadCsv" :disabled="!state.pairs.length">Export CSV</button>
                  <button class="btn" @click="copyCsvToClipboard" :disabled="!state.pairs.length">Copy for Sheet</button>
                  <button class="btn icon-btn" @click="openConfig" title="Configuration">⚙️</button>
                </div>
              </div>

              <div v-if="state.status" class="status" :class="state.statusType" style="margin-top:10px;">{{ state.status }}</div>
              <div class="hint" style="margin-top: 8px;">Loaded rows: {{ state.rowsLoaded }} · Visible pair cards: {{ filteredPairs.length }}</div>
            </div>
          </div>

          <div class="filter-floating-spacer" :style="{ height: state.filterFloating ? (state.filterHeight + 'px') : '0px' }"></div>
          <div ref="filterPanelRef" class="panel filter-panel" :class="{ floating: state.filterFloating, hidden: state.filterFloating && state.filterHidden }">
            <div class="toolbar-grid" style="grid-template-columns: 140px 1fr 1fr 1fr auto;">
              <div class="field">
                <label>Complex</label>
                <select v-model="filters.complex">
                  <option value="all">All</option>
                  <option value="more">More</option>
                  <option value="less">Less</option>
                </select>
              </div>
              <div class="field">
                <label>Topic</label>
                <select v-model="filters.topic">
                  <option value="">All Topics</option>
                  <option v-for="topic in filterTopics" :key="topic" :value="topic">{{ topic }}</option>
                </select>
              </div>
              <div class="field">
                <label>Subtopic</label>
                <select v-model="filters.subtopic">
                  <option value="">All Subtopics</option>
                  <option v-for="sub in filterSubtopics" :key="sub" :value="sub">{{ sub }}</option>
                </select>
              </div>
              <div class="field">
                <label>Phrase contains</label>
                <input v-model="filters.phrase" placeholder="search phrase text" />
              </div>
              <div class="toggle-field">
                <label>Phrases</label>
                <div class="toggle-wrap">
                  <div class="toggle-track" :class="{ on: filters.showPhrases }" @click="filters.showPhrases = !filters.showPhrases">
                    <div class="toggle-knob"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <button class="btn primary help-fab" @click="openHelp" title="Topic and subtopic guide">
            <span class="help-fab-icon">?</span>
            <span>Topic Definitions</span>
          </button>

          <div v-if="state.pairs.length" class="grid-head" :class="{ 'no-phrases': !filters.showPhrases }">
            <div>Image</div>
            <div>Reason</div>
            <div v-if="filters.showPhrases">Phrases</div>
          </div>

          <div v-for="item in filteredPairs" :key="item.pair.pairId"
               v-memo="[item.pair.more._phraseVersion, item.pair.less._phraseVersion, item.showMore, item.showLess, filters.showPhrases, state.selectedChip && state.selectedChip.pairId === item.pair.pairId ? state.selectedChip.phraseId : '', state.reasonSelection && state.reasonSelection.pairId === item.pair.pairId ? state.reasonSelection.start : -1, state.reasonDrag && state.reasonDrag.pairId === item.pair.pairId ? state.reasonDrag.previewStart : -1, state.reasonDrag && state.reasonDrag.pairId === item.pair.pairId ? state.reasonDrag.previewEnd : -1, state.draggingChipId || '', state.editingChipId || '', state.selectedText && state.selectedText.pairId === item.pair.pairId ? state.selectedText.text : '', state.copiedPhraseKey]"
               class="pair-card">
            <div class="pair-title">Pair row {{ item.pair.rowIndex + 2 }}</div>

            <div v-if="item.showMore" class="side-row more" :class="{ 'no-phrases': !filters.showPhrases }" :data-side-key="item.pair.pairId + '__more'">
              <div class="image-box">
                <img v-if="sideImageUrl(item.pair.more)" :src="sideImageUrl(item.pair.more)" :alt="item.pair.more.imgName" @click="openImageModal(item.pair.more)" />
                <div v-else class="hint">No image URL</div>
                <div class="image-name mono">{{ item.pair.more.imgName || '(empty)' }}</div>
                <div v-if="item.pair.more.parseError" class="status warn" style="margin:0;">Phrase JSON parse error</div>
              </div>

              <div class="reason-box"
                   :data-reason-box="item.pair.pairId + '__more'"
                   @mouseup="onReasonMouseUp(item.pair.pairId, 'more')"
                   @mousedown="onReasonMouseDown(item.pair.pairId, 'more', $event)"
                   @click="onReasonClick(item.pair.pairId, 'more', $event)"
                   @contextmenu.prevent="onReasonContextMenu(item.pair.pairId, 'more', $event)"
                   @mouseover="onReasonMouseOver(item.pair.pairId, 'more', $event)"
                   @mouseout="onReasonMouseOut(item.pair.pairId, 'more', $event)"
                   v-html="renderReason(item.pair.more, item.pair.pairId, 'more')"></div>

              <div v-if="filters.showPhrases" class="phrases-box">
                <button class="btn icon-btn phrases-copy-btn" :class="{ copied: state.copiedPhraseKey === (item.pair.pairId + '__more') }" @click="copyPhraseJson(item.pair.pairId, 'more')" title="Copy phrase JSON">{{ state.copiedPhraseKey === (item.pair.pairId + '__more') ? "✓" : "⧉" }}</button>
                <template v-for="(subMap, topic) in groupedForDisplay(item.pair.more)" :key="topic">
                  <div class="topic-block">
                    <div class="topic-name">{{ topic }}</div>
                    <template v-for="(chips, subtopic) in subMap" :key="topic + '__' + subtopic">
                      <div class="subtopic-row"
                           :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'more') }"
                           @dragover.prevent
                           @drop.prevent.stop="onDropToSubtopic(item.pair.pairId, 'more', topic, subtopic, $event)">
                        <div class="subtopic-name">{{ subtopic }}:</div>
                        <div class="chips-wrap">
                          <div v-for="chip in chips"
                               :key="chip.id"
                               class="chip"
                               :data-phrase-id="chip.id"
                               :class="{ selected: isSelectedChip(item.pair.pairId, 'more', chip.id), invalid: chipInvalid(item.pair.more, chip), editing: chip.editing, dragging: state.draggingChipId === chip.id }"
                               :style="phraseChipStyle(chip)"
                               @click.stop="selectPhrase(item.pair.pairId, 'more', chip.id, null)"
                               @contextmenu.prevent.stop="onChipContextMenu(item.pair.pairId, 'more', chip.id, $event)"
                               @mousedown.stop
                               @dblclick.stop="beginEditChip(item.pair.pairId, 'more', chip.id)"
                               @mouseenter="hoverPhrase(item.pair.pairId, 'more', chip.id)"
                               @mouseleave="leavePhrase(item.pair.pairId, 'more', chip.id)"
                               :draggable="!chip.editing"
                               @dragstart.stop="startChipDrag(item.pair.pairId, 'more', chip.id, $event)"
                               @dragend.stop="endChipDrag()">
                            <template v-if="chip.editing">
                              <input :data-chip-input="chip.id"
                                     v-model="chip._draft"
                                     @keydown.enter.prevent="saveEditChip(item.pair.pairId, 'more', chip.id, true)"
                                     @keydown.esc.prevent="saveEditChip(item.pair.pairId, 'more', chip.id, false)"
                                     @blur="saveEditChip(item.pair.pairId, 'more', chip.id, true)" />
                            </template>
                            <template v-else>
                              <span class="chip-text mono">{{ chip.phrase }}</span>
                            </template>
                          </div>
                        </div>
                      </div>
                    </template>
                    <div v-if="canAddTopic(item.pair.pairId, 'more', topic)" class="plus-row">
                      <div class="drop-plus"
                           :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'more') }"
                           @click="openAddDialog(item.pair.pairId, 'more', topic, '', true)"
                           @dragover.prevent
                           @drop.prevent.stop="openAddDialog(item.pair.pairId, 'more', topic, '', true, getDraggedInfo($event))">+</div>
                      
                    </div>
                  </div>
                </template>

                <div v-if="canAddAnyTopic(item.pair.pairId, 'more')" class="top-level-add plus-row">
                  <div class="drop-plus"
                       :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'more') }"
                       @click="openAddDialog(item.pair.pairId, 'more')"
                       @dragover.prevent
                       @drop.prevent.stop="openAddDialog(item.pair.pairId, 'more', '', '', false, getDraggedInfo($event))">+</div>
                  
                </div>
              </div>
            </div>

            <div v-if="item.showLess" class="side-row less" :class="{ 'no-phrases': !filters.showPhrases }" :data-side-key="item.pair.pairId + '__less'">
              <div class="image-box">
                <img v-if="sideImageUrl(item.pair.less)" :src="sideImageUrl(item.pair.less)" :alt="item.pair.less.imgName" @click="openImageModal(item.pair.less)" />
                <div v-else class="hint">No image URL</div>
                <div class="image-name mono">{{ item.pair.less.imgName || '(empty)' }}</div>
                <div v-if="item.pair.less.parseError" class="status warn" style="margin:0;">Phrase JSON parse error</div>
              </div>

              <div class="reason-box"
                   :data-reason-box="item.pair.pairId + '__less'"
                   @mouseup="onReasonMouseUp(item.pair.pairId, 'less')"
                   @mousedown="onReasonMouseDown(item.pair.pairId, 'less', $event)"
                   @click="onReasonClick(item.pair.pairId, 'less', $event)"
                   @contextmenu.prevent="onReasonContextMenu(item.pair.pairId, 'less', $event)"
                   @mouseover="onReasonMouseOver(item.pair.pairId, 'less', $event)"
                   @mouseout="onReasonMouseOut(item.pair.pairId, 'less', $event)"
                   v-html="renderReason(item.pair.less, item.pair.pairId, 'less')"></div>

              <div v-if="filters.showPhrases" class="phrases-box">
                <button class="btn icon-btn phrases-copy-btn" :class="{ copied: state.copiedPhraseKey === (item.pair.pairId + '__less') }" @click="copyPhraseJson(item.pair.pairId, 'less')" title="Copy phrase JSON">{{ state.copiedPhraseKey === (item.pair.pairId + '__less') ? "✓" : "⧉" }}</button>
                <template v-for="(subMap, topic) in groupedForDisplay(item.pair.less)" :key="topic">
                  <div class="topic-block">
                    <div class="topic-name">{{ topic }}</div>
                    <template v-for="(chips, subtopic) in subMap" :key="topic + '__' + subtopic">
                      <div class="subtopic-row"
                           :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'less') }"
                           @dragover.prevent
                           @drop.prevent.stop="onDropToSubtopic(item.pair.pairId, 'less', topic, subtopic, $event)">
                        <div class="subtopic-name">{{ subtopic }}:</div>
                        <div class="chips-wrap">
                          <div v-for="chip in chips"
                               :key="chip.id"
                               class="chip"
                               :data-phrase-id="chip.id"
                               :class="{ selected: isSelectedChip(item.pair.pairId, 'less', chip.id), invalid: chipInvalid(item.pair.less, chip), editing: chip.editing, dragging: state.draggingChipId === chip.id }"
                               :style="phraseChipStyle(chip)"
                               @click.stop="selectPhrase(item.pair.pairId, 'less', chip.id, null)"
                               @contextmenu.prevent.stop="onChipContextMenu(item.pair.pairId, 'less', chip.id, $event)"
                               @mousedown.stop
                               @dblclick.stop="beginEditChip(item.pair.pairId, 'less', chip.id)"
                               @mouseenter="hoverPhrase(item.pair.pairId, 'less', chip.id)"
                               @mouseleave="leavePhrase(item.pair.pairId, 'less', chip.id)"
                               :draggable="!chip.editing"
                               @dragstart.stop="startChipDrag(item.pair.pairId, 'less', chip.id, $event)"
                               @dragend.stop="endChipDrag()">
                            <template v-if="chip.editing">
                              <input :data-chip-input="chip.id"
                                     v-model="chip._draft"
                                     @keydown.enter.prevent="saveEditChip(item.pair.pairId, 'less', chip.id, true)"
                                     @keydown.esc.prevent="saveEditChip(item.pair.pairId, 'less', chip.id, false)"
                                     @blur="saveEditChip(item.pair.pairId, 'less', chip.id, true)" />
                            </template>
                            <template v-else>
                              <span class="chip-text mono">{{ chip.phrase }}</span>
                            </template>
                          </div>
                        </div>
                      </div>
                    </template>
                    <div v-if="canAddTopic(item.pair.pairId, 'less', topic)" class="plus-row">
                      <div class="drop-plus"
                           :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'less') }"
                           @click="openAddDialog(item.pair.pairId, 'less', topic, '', true)"
                           @dragover.prevent
                           @drop.prevent.stop="openAddDialog(item.pair.pairId, 'less', topic, '', true, getDraggedInfo($event))">+</div>
                      
                    </div>
                  </div>
                </template>

                <div v-if="canAddAnyTopic(item.pair.pairId, 'less')" class="top-level-add plus-row">
                  <div class="drop-plus"
                       :class="{ 'drop-hover': addAllowed(item.pair.pairId, 'less') }"
                       @click="openAddDialog(item.pair.pairId, 'less')"
                       @dragover.prevent
                       @drop.prevent.stop="openAddDialog(item.pair.pairId, 'less', '', '', false, getDraggedInfo($event))">+</div>
                  
                </div>
              </div>
            </div>
          </div>

          <div v-if="state.contextMenu.open" class="context-menu-mask" @mousedown="closeContextMenu"></div>
          <div v-if="state.contextMenu.open" class="context-menu" :style="{ left: state.contextMenu.x + 'px', top: state.contextMenu.y + 'px' }" @mousedown.stop @click.stop>
            <div class="context-menu-meta mono">{{ state.contextMenu.text }}</div>
            <div class="context-menu-columns">
              <div class="context-menu-col">
                <div class="context-menu-title">Topic</div>
                <button v-for="topic in filterTopics"
                        :key="'ctx-topic-' + topic"
                        class="context-menu-item"
                        :class="{ active: state.contextMenu.activeTopic === topic }"
                        @mouseenter="setContextMenuTopic(topic)"
                        @click="setContextMenuTopic(topic)">{{ topic }}</button>
              </div>
              <div class="context-menu-col">
                <div class="context-menu-title">Subtopic</div>
                <button v-for="sub in contextMenuSubtopics"
                        :key="'ctx-sub-' + state.contextMenu.activeTopic + '__' + sub"
                        class="context-menu-item"
                        @click="applyContextMenuChoice(state.contextMenu.activeTopic, sub)">{{ sub }}</button>
              </div>
            </div>
          </div>

          <div v-if="state.showConfig" class="modal-mask" @click.self="closeConfig">
            <div class="modal" style="width:min(1100px, 100%); max-height: 92vh; overflow:auto;">
              <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h3 style="margin:0;">Configuration</h3>
                <button class="btn" @click="closeConfig">Close</button>
              </div>

              <div class="toolbar-grid" style="margin-top: 10px; grid-template-columns: repeat(3, minmax(0,1fr));">
                <div class="field">
                  <label>Spreadsheet ID</label>
                  <input v-model="config.spreadsheetId" placeholder="Google Sheets spreadsheet_id" />
                </div>
                <div class="field">
                  <label>Sheet ID (gid)</label>
                  <input v-model="config.sheetId" placeholder="gid / sheet_id" />
                </div>
                <div class="field">
                  <label>Image URL Prefix</label>
                  <input v-model="config.imageUrlPrefix" placeholder="https://.../" />
                </div>
              </div>

              <div class="toolbar-grid" style="margin-top: 10px; grid-template-columns: repeat(3, minmax(0,1fr));">
                <div class="field">
                  <label>More ImgName column</label>
                  <input v-model="config.moreImgCol" />
                </div>
                <div class="field">
                  <label>More Reason column</label>
                  <input v-model="config.moreReasonCol" />
                </div>
                <div class="field">
                  <label>More Phrases column</label>
                  <input v-model="config.morePhrasesCol" />
                </div>
              </div>

              <div class="toolbar-grid" style="margin-top: 10px; grid-template-columns: repeat(3, minmax(0,1fr));">
                <div class="field">
                  <label>Less ImgName column</label>
                  <input v-model="config.lessImgCol" />
                </div>
                <div class="field">
                  <label>Less Reason column</label>
                  <input v-model="config.lessReasonCol" />
                </div>
                <div class="field">
                  <label>Less Phrases column</label>
                  <input v-model="config.lessPhrasesCol" />
                </div>
              </div>
            </div>
            </div>
          </div>

          <div v-if="state.showHelp" class="modal-mask" @click.self="closeHelp">
            <div class="modal help-modal">
              <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <div>
                  <h3 style="margin:0 0 4px;">Topic &amp; Subtopic Guide</h3>
                  <div class="hint">Definitions for the current topic system. The generic “Others” bucket is intentionally omitted here.</div>
                </div>
                <button class="btn" @click="closeHelp">Close</button>
              </div>

              <div class="help-doc">
                <div v-for="topicItem in HELP_DOC" :key="topicItem.topic" class="help-topic-card">
                  <h4>{{ topicItem.topic }}</h4>
                  <p class="help-topic-def">{{ topicItem.definition }}</p>
                  <div class="help-subtopic-list">
                    <div v-for="sub in topicItem.subtopics" :key="topicItem.topic + '__' + sub.name" class="help-subtopic-item">
                      <div class="help-subtopic-title">{{ sub.name }}</div>
                      <p class="help-subtopic-def">{{ sub.definition }}</p>
                      <div v-if="sub.examples" class="help-example"><strong>Examples:</strong> {{ sub.examples }}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div v-if="state.imageModal.open" class="modal-mask" @click.self="closeImageModal">
            <div class="modal preview-modal">
              <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <div>
                  <h3 style="margin:0 0 4px;">{{ state.imageModal.name || 'Image preview' }}</h3>
                  <div class="hint">Image name has been copied to the clipboard when possible.</div>
                </div>
                <button class="btn" @click="closeImageModal">Close</button>
              </div>
              <div class="preview-image-wrap">
                <img v-if="state.imageModal.url" :src="state.imageModal.url" :alt="state.imageModal.name" />
                <div v-else class="status warn">No image URL available.</div>
              </div>
            </div>
          </div>

          <div v-if="state.addDialog.open" class="modal-mask" @click.self="cancelAddDialog">
            <div class="modal">
              <h3>Add Phrase</h3>
              <div class="field">
                <label>Phrase</label>
                <input v-model="state.addDialog.phrase" class="mono" />
              </div>
              <div class="toolbar-grid" style="grid-template-columns: 1fr 1fr; margin-top: 10px;">
                <div class="field">
                  <label>Topic</label>
                  <select v-model="state.addDialog.topic" :disabled="state.addDialog.topicLocked">
                    <option v-for="topic in addDialogTopicOptionsList" :key="topic" :value="topic">{{ topic }}</option>
                  </select>
                </div>
                <div class="field">
                  <label>Subtopic</label>
                  <select v-model="state.addDialog.subtopic">
                    <option v-for="sub in addDialogSubtopicOptionsList" :key="sub" :value="sub">{{ sub }}</option>
                  </select>
                </div>
              </div>
              <div class="hint" style="margin-top: 8px;">The phrase should ideally be an exact substring from the corresponding reason. This tool warns on mismatch but does not block manual edits.</div>
              <div class="footer-actions">
                <button class="btn" @click="cancelAddDialog">Cancel</button>
                <button class="btn primary" @click="confirmAddDialog">Add</button>
              </div>
            </div>
          </div>
        </div>
      `,
    }).mount('#app');
  </script>
</body>

</html>
