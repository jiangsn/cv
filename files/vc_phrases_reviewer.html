          },
          {
            name: "Typography & Readability",
            definition: "Font size, rotation, structure, spatial arrangement, and visual clarity of text elements.",
            examples: "word rotation/small font size; clear text arrangement/density",
          },
        ],
      },
      {
        topic: "Schema",
        definition: "The degree to which observers immediately recognize common visual forms—such as familiar layouts, textures, map shapes, or diagram types—making interpretation easier.",
        subtopics: [
          {
            name: "Domain Familiarity",
            definition: "Whether the image requires specialized domain knowledge (e.g., chemistry, biology, geography) or uses unfamiliar or specialized representational conventions.",
            examples: "domain-specific concepts (e.g., chemical, biology, map)",
          },
          {
            name: "Dimensionality & Structure",
            definition: "Spatial dimensionality (2D vs 3D), layout organization, and the structural framework of the visualization.",
            examples: "2D/3D",
          },
          {
            name: "Abstraction Level",
            definition: "Use of non-representational, abstract visual forms that lack familiar real-world referents.",
            examples: "abstract shapes or colors",
          },
        ],
      },
      {
        topic: "Color, Symbol, and Texture Details",
        definition: "The degree to which observers perceive and understand fine-grained color variations, symbol compositions, 3D cues, or textured regions in the visualization.",
        subtopics: [
          {
            name: "Color Palette & Contrast",
            definition: "The range, variety, and arrangement of colors used — including gradients, hues, saturation, color schemes — and whether colors are visually distinguishable and provide clear separation, contrast, and background effects.",
            examples: "color variety/shading; two colors; monochrome; bright colors; inadequate/few coloring; color contrast/clarity; distinguishable/full/highly contrast color uses; distinguishable color variety/arrangement/distribution; soft/layered/overlapping colors; blurry colors/images; white/black background / other background",
          },
          {
            name: "Symbols & Texture",
            definition: "Non-color graphical markers, textures, icons, and patterned visual elements used alongside or instead of color.",
            examples: "symbols",
          },
        ],
      },
      {
        topic: "Aesthetics Uncertainty",
        definition: "The degree of uncertainty or discomfort observers feel when visual style, color harmony, or structure makes interpretation unclear or unstable.",
        subtopics: [
          {
            name: "Visual Disorganization",
            definition: "Whether the image feels random, messy, distracting, inconsistent, overwhelming, or lacking coherent structure.",
            examples: "distracting/confusing/unclear",
          },
          {
            name: "Perceptual Ambiguity",
            definition: "Uncertainty in perceiving specific visual attributes like color and contrast, leading to aesthetic confusion.",
            examples: "unclear colors/contrast",
          },
        ],
      },
      {
        topic: "Immediacy / Cognitive Load",
        definition: "The effect on observers in terms of mental effort, including the time and cognitive resources needed to inspect, compare, or make sense of the visualization. This reflects the viewer's experience, not the cause.",
        subtopics: [
          {
            name: "Interpretive Difficulty",
            definition: "Overall subjective ease or difficulty of interpreting, reading, understanding, or differentiating the visualization.",
            examples: "easy/hard to interpret; more difficult to focus/follow",
          },
          {
            name: "Semantic Clarity",
            definition: "Whether the visualization conveys an unambiguous, understandable message about what the data represents.",
            examples: "unclear meaning/confusing",
          },
          {
            name: "Processing Time & Effort",
            definition: "The time, cognitive effort, or specialized knowledge needed to process and analyze the visualization.",
            examples: "take longer to interpret; read/analyze many figures/items",
          },
        ],
      },
    ];

    // ── Build a lookup map for HELP_DOC definitions ──────────────────
    const HELP_LOOKUP = {};
    for (const item of HELP_DOC) {
      HELP_LOOKUP[item.topic] = { definition: item.definition, subtopics: {} };
      for (const sub of item.subtopics) {
        HELP_LOOKUP[item.topic].subtopics[sub.name] = { definition: sub.definition, examples: sub.examples || '' };
      }
    }

    const DEFAULT_CONFIG = {
      spreadsheetId: "1wFB1SdEX0wOInqcCDE1tHE-Wg0JDbMnKVne6SezI6FA",
      sheetId: "1165452509",
      imageUrlPrefix: "https://raw.githubusercontent.com/c109363/ExperimentImage/main/AllDataResize/",
      moreImgCol: "MoreComplexImageName",
      lessImgCol: "LessComplexImageName",
      moreReasonCol: "MoreComplexReason",
      lessReasonCol: "LessComplexReason",
      morePhrasesCol: "MoreComplexKeyPhrasesSubTopics",
      lessPhrasesCol: "LessComplexKeyPhrasesSubTopics",
      oauthClientId: "631741966283-d138baoarvob9mlecoc1n6vk4rr9iqkd.apps.googleusercontent.com",
    };

    const uid = (() => {
      let n = 1;
      return () => `p_${n++}`;
    })();

    // ── Undo / Redo history system ─────────────────────────────────
    const UNDO_MAX = 200;
    const _undoStack = [];
    const _redoStack = [];

    // Each action: { type, description, undo(), redo(), pairId, side, phraseId }
    function pushUndo(action) {
      _undoStack.push(action);
      if (_undoStack.length > UNDO_MAX) _undoStack.shift();
      _redoStack.length = 0; // clear redo on new action
    }

    function canUndo() { return _undoStack.length > 0; }
    function canRedo() { return _redoStack.length > 0; }

    // Toast management (non-reactive, pure DOM)
    let _toastEl = null;
    let _toastTimer = 0;

    function _ensureToast() {
      if (_toastEl) return _toastEl;
      _toastEl = document.createElement('div');
      _toastEl.className = 'undo-toast';
      document.body.appendChild(_toastEl);
      return _toastEl;
    }

    function showUndoToast(actionLabel, detail) {
      const el = _ensureToast();
      el.innerHTML = `<span class="toast-action">${escapeHtml(actionLabel)}</span><span class="toast-detail">${escapeHtml(detail)}</span>`;
      // Force reflow to restart transition
      el.classList.remove('visible');
      void el.offsetWidth;
      el.classList.add('visible');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => {
        el.classList.remove('visible');
      }, 5000);
    }

    function _truncate(s, max = 30) {
      const t = String(s || '');
      return t.length > max ? t.slice(0, max - 1) + '…' : t;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", "&#39;");
    }

    function safeJsonParse(text) {
      if (text == null) return null;
      const raw = String(text).trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch {
        return { _parse_error: raw };
      }
    }

    function normalizePhraseTree(tree) {
      if (!tree || typeof tree !== 'object' || Array.isArray(tree)) return {};
      const out = {};
      for (const [topic, sub] of Object.entries(tree)) {
        if (!topic) continue;
        if (Array.isArray(sub)) {
          out[topic] = { Others: sub.filter(Boolean).map(String) };
          continue;
        }
        if (!sub || typeof sub !== 'object') continue;
        out[topic] = {};
        for (const [subtopic, arr] of Object.entries(sub)) {
          if (!subtopic) continue;
          const phrases = Array.isArray(arr) ? arr.filter(v => String(v || '').trim()).map(v => String(v)) : [];
          if (phrases.length) out[topic][subtopic] = phrases;
        }
        if (!Object.keys(out[topic]).length) delete out[topic];
      }
      return out;
    }

    function flattenPhraseTree(tree) {
      const obj = normalizePhraseTree(tree);
      const out = [];
      for (const [topic, subMap] of Object.entries(obj)) {
        for (const [subtopic, arr] of Object.entries(subMap)) {
          for (const phrase of arr) {
            out.push({ id: uid(), phrase, topic, subtopic, editing: false, selected: false, modified: false });
          }
        }
      }
      return out;
    }

    function buildPhraseTreeFromFlat(flat) {
      const out = {};
      for (const item of flat) {
        const phrase = String(item.phrase || '').trim();
        const topic = String(item.topic || '').trim();
        const subtopic = String(item.subtopic || '').trim();
        if (!phrase || !topic || !subtopic) continue;
        if (!out[topic]) out[topic] = {};
        if (!out[topic][subtopic]) out[topic][subtopic] = [];
        out[topic][subtopic].push(phrase);
      }
      return out;
    }

    function serializePhraseTree(flat) {
      return JSON.stringify(buildPhraseTreeFromFlat(flat), null, 2);
    }

    function findMissingTopics(sideRow) {
      const existing = new Set(sideRow.phrases.map(p => p.topic).filter(Boolean));
      return Object.keys(TOPIC_META).filter(t => !existing.has(t));
    }

    function findMissingSubtopics(sideRow, topic) {
      const existing = new Set(sideRow.phrases.filter(p => p.topic === topic).map(p => p.subtopic).filter(Boolean));
      return (TOPIC_META[topic] || ['Others']).filter(s => !existing.has(s));
    }

    function buildCsvUrl(cfg) {
      if (cfg.spreadsheetId.trim() && cfg.sheetId.trim()) {
        return `https://docs.google.com/spreadsheets/d/${cfg.spreadsheetId.trim()}/export?gid=${cfg.sheetId.trim()}&format=csv`;
      }
      return '';
    }

    function buildGvizJsonpUrl(cfg, callbackName) {
      const spreadsheetId = String(cfg.spreadsheetId || '').trim();
      const sheetId = String(cfg.sheetId || '').trim();
      if (!spreadsheetId || !sheetId || !callbackName) return '';
      const tqx = `responseHandler:${callbackName};out:json`;
      return `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?gid=${encodeURIComponent(sheetId)}&headers=1&tqx=${encodeURIComponent(tqx)}`;
    }

    function normalizeGvizCellValue(cell) {
      if (!cell) return '';
      if (cell.f != null && cell.f !== '') return cell.f;
      const v = cell.v;
      if (v == null) return '';
      if (v instanceof Date) return v.toISOString();
      return v;
    }

    function gvizResponseToRows(resp) {
      const table = resp && resp.table;
      if (!table || !Array.isArray(table.cols) || !Array.isArray(table.rows)) {
        throw new Error('Unexpected Google Sheets response format.');
      }

      const headers = table.cols.map((col, idx) => {
        const label = String(col && col.label != null ? col.label : '').trim();
        const id = String(col && col.id != null ? col.id : '').trim();
        return label || id || `Column${idx + 1}`;
      });

      const rows = table.rows.map((row) => {
        const out = {};
        const cells = Array.isArray(row && row.c) ? row.c : [];
        headers.forEach((header, idx) => {
          out[header] = normalizeGvizCellValue(cells[idx]);
        });
        return out;
      });
      return { rows, headers };
    }

    function loadGoogleSheetJsonp(cfg) {
      return new Promise((resolve, reject) => {
        const cbName = `__reviewerSheetCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const src = buildGvizJsonpUrl(cfg, cbName);
        if (!src) {
          reject(new Error('Please provide Spreadsheet ID and Sheet ID.'));
          return;
        }

        let finished = false;
        const script = document.createElement('script');
        let timeoutId = 0;

        function cleanup() {
          if (script.parentNode) script.parentNode.removeChild(script);
          try {
            delete window[cbName];
          } catch (_) {
            window[cbName] = undefined;
          }
          if (timeoutId) {
            window.clearTimeout(timeoutId);
            timeoutId = 0;
          }
        }

        window[cbName] = function (resp) {
          if (finished) return;
          finished = true;
          cleanup();
          if (!resp) {
            reject(new Error('Empty response from Google Sheets.'));
            return;
          }
          if (resp.status === 'error') {
            const err = Array.isArray(resp.errors) && resp.errors[0] ? resp.errors[0] : {};
            reject(new Error(err.detailed_message || err.message || 'Google Sheets returned an error.'));
            return;
          }
          try {
            resolve(gvizResponseToRows(resp));
          } catch (e) {
            reject(e);
          }
        };

        script.async = true;
        script.src = src;
        script.onerror = function () {
          if (finished) return;
          finished = true;
          cleanup();
          reject(new Error('Google Sheets request failed. Make sure the sheet is public or link-viewable.'));
        };

        timeoutId = window.setTimeout(() => {
          if (finished) return;
          finished = true;
          cleanup();
          reject(new Error('Google Sheets request timed out.'));
        }, 20000);

        document.head.appendChild(script);
      });
    }

    function buildImageUrl(prefix, imgName) {
      const p = String(prefix || '').trim();
      const n = String(imgName || '').trim();
      if (!n) return '';
      if (!p) return n;
      return p.endsWith('/') ? `${p}${n}` : `${p}/${n}`;
    }

    function phraseInReason(phrase, reason) {
      const p = String(phrase || '');
      const r = String(reason || '');
      if (!p.trim()) return false;
      return r.includes(p);
    }

    const TOPIC_BASE_COLORS = {
      "Data Density / Image Clutter": "#9de1fe",
      "Visual Encoding Clarity": "#fec5ad",
      "Semantics / Text Legibility": "#d4ffe3",
      "Schema": "#feecae",
      "Color, Symbol, and Texture Details": "#bfbffd",
      "Aesthetics Uncertainty": "#ffd4f2",
      "Immediacy / Cognitive Load": "#DFF3A6",
      "Others": "#cccccc",
    };

    const SUBTOPIC_COLOR_CACHE = new Map();

    function clamp(n, min, max) {
      return Math.min(Math.max(n, min), max);
    }

    function hexToRgb(hex) {
      const raw = String(hex || '').replace('#', '').trim();
      if (!raw) return { r: 204, g: 204, b: 204 };
      const full = raw.length === 3 ? raw.split('').map(ch => ch + ch).join('') : raw;
      const n = parseInt(full, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (v) => clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function mixHex(a, b, weight = 0.5) {
      const ca = hexToRgb(a);
      const cb = hexToRgb(b);
      const w = clamp(weight, 0, 1);
      return rgbToHex({
        r: ca.r * (1 - w) + cb.r * w,
        g: ca.g * (1 - w) + cb.g * w,
        b: ca.b * (1 - w) + cb.b * w,
      });
    }

    function getPhraseVisual(topic, subtopic) {
      const t = String(topic || 'Others').trim() || 'Others';
      const s = String(subtopic || 'Others').trim() || 'Others';
      const key = `${t}__${s}`;
      if (SUBTOPIC_COLOR_CACHE.has(key)) return SUBTOPIC_COLOR_CACHE.get(key);

      const base = TOPIC_BASE_COLORS[t] || TOPIC_BASE_COLORS.Others;
      let bg = base;
      if (s !== 'Others') {
        const subtopics = (TOPIC_META[t] || ['Others']).filter(x => x !== 'Others');
        const idx = Math.max(0, subtopics.indexOf(s));
        const weights = [0.2, 0.4, 0.6];
        bg = mixHex(base, '#ffffff', weights[idx % weights.length]);
      }
      const visual = {
        bg,
        border: mixHex(bg, '#111827', 0.24),
      };
      SUBTOPIC_COLOR_CACHE.set(key, visual);
      return visual;
    }

    function findPhraseById(sideRow, phraseId) {
      if (!sideRow?.phrases) return null;
      // Use a cached index for O(1) lookup
      if (!sideRow._phraseIndex || sideRow._phraseIndex.version !== sideRow._phraseVersion) {
        const map = new Map();
        for (const p of sideRow.phrases) map.set(p.id, p);
        sideRow._phraseIndex = { version: sideRow._phraseVersion, map };
      }
      return sideRow._phraseIndex.map.get(phraseId) || null;
    }

    function findPhraseByText(sideRow, phraseText, excludeId = null) {
      const needle = String(phraseText || '').trim();
      if (!needle) return null;
      return sideRow?.phrases?.find(p => p.id !== excludeId && String(p.phrase || '').trim() === needle) || null;
    }

    function findPhraseOccurrences(text, phraseText) {
      const textValue = String(text || '');
      const needle = String(phraseText || '');
      const out = [];
      if (!needle) return out;
      let idx = 0;
      let occurrenceIndex = 0;
      while (idx <= textValue.length - needle.length) {
        const found = textValue.indexOf(needle, idx);
        if (found === -1) break;
        out.push({ start: found, end: found + needle.length, occurrenceIndex });
        occurrenceIndex += 1;
        idx = found + Math.max(needle.length, 1);
      }
      return out;
    }

    function finalizeReasonLayout(text, candidates) {
      const ordered = [...(candidates || [])].sort((a, b) => (
        a.start - b.start ||
        b.len - a.len ||
        String(a.phraseText).localeCompare(String(b.phraseText)) ||
        String(a.phraseId).localeCompare(String(b.phraseId)) ||
        a.occurrenceIndex - b.occurrenceIndex
      ));

      const matches = [];
      const hidden = [];
      for (const cand of ordered) {
        const overlap = matches.find(m => !(cand.end <= m.start || cand.start >= m.end));
        if (overlap) {
          hidden.push(cand);
          continue;
        }
        matches.push(cand);
      }
      matches.sort((a, b) => a.start - b.start || a.end - b.end);
      return { text, matches, hidden };
    }

    function initSideRuntime(sideRow) {
      if (!sideRow) return sideRow;
      sideRow._phraseVersion = 1;
      sideRow._layoutCache = null;
      sideRow._renderCache = null;
      return sideRow;
    }

    function bumpSidePhraseVersion(sideRow) {
      if (!sideRow) return;
      sideRow._phraseVersion = (sideRow._phraseVersion || 0) + 1;
      sideRow._layoutCache = null;
      sideRow._renderCache = null;
    }

    function getBaseReasonLayout(sideRow) {
      const text = String(sideRow?.reason || '');
      const version = Number(sideRow?._phraseVersion || 0);
      const cached = sideRow?._layoutCache;
      if (cached && cached.version === version && cached.text === text) return cached;

      const candidates = [];
      for (const phrase of sideRow?.phrases || []) {
        const phraseText = String(phrase.phrase || '');
        if (!phraseText) continue;
        const hits = findPhraseOccurrences(text, phraseText);
        for (const hit of hits) {
          candidates.push({
            phraseId: phrase.id,
            phraseText,
            topic: phrase.topic,
            subtopic: phrase.subtopic,
            start: hit.start,
            end: hit.end,
            occurrenceIndex: hit.occurrenceIndex,
            len: hit.end - hit.start,
          });
        }
      }

      const layout = finalizeReasonLayout(text, candidates);
      const next = { version, text, candidates, layout };
      if (sideRow) sideRow._layoutCache = next;
      return next;
    }

    function buildReasonLayout(sideRow, preview = null) {
      const base = getBaseReasonLayout(sideRow);
      if (!preview) return base.layout;

      const candidates = base.candidates.filter(c => !(
        c.phraseId === preview.phraseId &&
        c.occurrenceIndex === preview.occurrenceIndex
      ));

      const previewPhrase = findPhraseById(sideRow, preview.phraseId);
      if (previewPhrase) {
        candidates.push({
          phraseId: previewPhrase.id,
          phraseText: String(base.text.slice(preview.start, preview.end) || ''),
          topic: previewPhrase.topic,
          subtopic: previewPhrase.subtopic,
          start: preview.start,
          end: preview.end,
          occurrenceIndex: preview.occurrenceIndex,
          len: preview.end - preview.start,
          isPreview: true,
        });
      }

      return finalizeReasonLayout(base.text, candidates);
    }

    function getSelectedPhraseId(state, pairId, side) {
      return state.selectedChip && state.selectedChip.pairId === pairId && state.selectedChip.side === side
        ? state.selectedChip.phraseId
        : null;
    }

    function renderReasonHtml(sideRow, pairId, side, state) {
      const drag = state.reasonDrag && state.reasonDrag.pairId === pairId && state.reasonDrag.side === side
        ? state.reasonDrag
        : null;
      const preview = drag ? trimRangeToContent(String(sideRow?.reason || ''), drag.previewStart, drag.previewEnd) : null;
      const selectedPhraseId = getSelectedPhraseId(state, pairId, side);
      const activeSelection = drag ? {
        pairId,
        side,
        phraseId: drag.phraseId,
        occurrenceIndex: drag.occurrenceIndex,
        start: preview.start,
        end: preview.end,
      } : (state.reasonSelection && state.reasonSelection.pairId === pairId && state.reasonSelection.side === side
        ? state.reasonSelection
        : null);
      const previewKey = drag && preview ? `${preview.start}:${preview.end}:${drag.phraseId}:${drag.occurrenceIndex}` : '';
      const activeKey = activeSelection
        ? `${activeSelection.phraseId}:${activeSelection.occurrenceIndex}:${activeSelection.start}:${activeSelection.end}`
        : '';
      const renderKey = [
        Number(sideRow?._phraseVersion || 0),
        selectedPhraseId || '',
        activeKey,
        previewKey,
      ].join('|');
      if (sideRow?._renderCache && sideRow._renderCache.key === renderKey) {
        return sideRow._renderCache.html;
      }

      const layout = buildReasonLayout(sideRow, drag && preview.end > preview.start ? {
        phraseId: drag.phraseId,
        occurrenceIndex: drag.occurrenceIndex,
        start: preview.start,
        end: preview.end,
      } : null);
      const text = layout.text;
      if (!layout.matches.length) {
        const html = escapeHtml(text);
        if (sideRow) sideRow._renderCache = { key: renderKey, html };
        return html;
      }

      let out = '';
      let cursor = 0;
      for (const match of layout.matches) {
        out += escapeHtml(text.slice(cursor, match.start));
        const phrase = findPhraseById(sideRow, match.phraseId);
        const visual = getPhraseVisual(phrase?.topic, phrase?.subtopic);
        const classes = ['reason-phrase'];
        if (match.phraseId === selectedPhraseId) classes.push('is-selected');

        const isActive = !!activeSelection &&
          activeSelection.phraseId === match.phraseId &&
          activeSelection.occurrenceIndex === match.occurrenceIndex;
        if (isActive) classes.push('is-active-occurrence');

        out += `<span class="${classes.join(' ')}" style="--phrase-bg:${visual.bg}; --phrase-border:${visual.border};" data-phrase-id="${escapeHtml(match.phraseId)}" data-topic="${escapeHtml(phrase?.topic || '')}" data-subtopic="${escapeHtml(phrase?.subtopic || '')}" data-occurrence-index="${match.occurrenceIndex}" data-start="${match.start}" data-end="${match.end}">`;
        if (isActive) out += `<span class="boundary-handle left" data-handle-side="left"></span>`;
        out += escapeHtml(text.slice(match.start, match.end));
        if (isActive) out += `<span class="boundary-handle right" data-handle-side="right"></span>`;
        out += `</span>`;
        cursor = match.end;
      }
      out += escapeHtml(text.slice(cursor));
      if (sideRow) sideRow._renderCache = { key: renderKey, html: out };
      return out;
    }

    function getWordRanges(text) {
      const out = [];
      const regex = /\S+/g;
      let m;
      while ((m = regex.exec(text))) {
        out.push({ start: m.index, end: m.index + m[0].length });
      }
      return out;
    }

    function chooseBoundaryIndex(text, anchorStart, anchorEnd, handleSide, rawIndex) {
      const words = getWordRanges(text);
      if (!words.length) return handleSide === 'left' ? anchorStart : anchorEnd;
      const candidates = handleSide === 'left'
        ? words.map(w => w.start).filter(v => v < anchorEnd)
        : words.map(w => w.end).filter(v => v > anchorStart);
      if (!candidates.length) return handleSide === 'left' ? anchorStart : anchorEnd;
      let best = candidates[0];
      let bestDist = Math.abs(best - rawIndex);
      for (const candidate of candidates) {
        const dist = Math.abs(candidate - rawIndex);
        if (dist < bestDist) {
          best = candidate;
          bestDist = dist;
        }
      }
      return best;
    }

    function trimRangeToContent(text, start, end) {
      let s = clamp(start, 0, text.length);
      let e = clamp(end, 0, text.length);
      if (e < s) [s, e] = [e, s];
      while (s < e && /\s/.test(text[s])) s += 1;
      while (e > s && /\s/.test(text[e - 1])) e -= 1;
      return { start: s, end: e };
    }

    function getTextNodeSegments(root) {
      const segments = [];
      let offset = 0;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node?.nodeValue) return NodeFilter.FILTER_REJECT;
          if (node.parentElement?.classList?.contains('boundary-handle')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        },
      });
      let node;
      while ((node = walker.nextNode())) {
        segments.push({ node, start: offset, end: offset + node.nodeValue.length });
        offset += node.nodeValue.length;
      }
      return segments;
    }

    function getCharOffsetFromPoint(root, x, y) {
      let node = null;
      let localOffset = 0;
      if (document.caretPositionFromPoint) {
        const pos = document.caretPositionFromPoint(x, y);
        if (!pos) return null;
        node = pos.offsetNode;
        localOffset = pos.offset;
      } else if (document.caretRangeFromPoint) {
        const range = document.caretRangeFromPoint(x, y);
        if (!range) return null;
        node = range.startContainer;
        localOffset = range.startOffset;
      }
      if (!node) return null;
      if (node.nodeType === Node.ELEMENT_NODE) {
        const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null);
        const firstText = walker.nextNode();
        if (!firstText) return null;
        node = firstText;
        localOffset = 0;
      }
      const segments = getTextNodeSegments(root);
      const hit = segments.find(seg => seg.node === node);
      if (!hit) return null;
      return clamp(hit.start + localOffset, hit.start, hit.end);
    }

    function parseRowsToPairs(rows, cfg) {

      return rows.map((row, index) => {
        const moreReason = String(row[cfg.moreReasonCol] ?? '');
        const lessReason = String(row[cfg.lessReasonCol] ?? '');
        const moreRaw = safeJsonParse(row[cfg.morePhrasesCol]);
        const lessRaw = safeJsonParse(row[cfg.lessPhrasesCol]);

        const pairId = `pair_${index}`;

        return {
          pairId,
          rowIndex: index,
          originalRow: Object.freeze({ ...row }),
          more: initSideRuntime({
            side: 'more',
            complexLabel: 'More',
            imgName: String(row[cfg.moreImgCol] ?? ''),
            reason: moreReason,
            phrases: flattenPhraseTree(moreRaw),
            parseError: moreRaw && moreRaw._parse_error ? String(moreRaw._parse_error) : '',
          }),
          less: initSideRuntime({
            side: 'less',
            complexLabel: 'Less',
            imgName: String(row[cfg.lessImgCol] ?? ''),
            reason: lessReason,
            phrases: flattenPhraseTree(lessRaw),
            parseError: lessRaw && lessRaw._parse_error ? String(lessRaw._parse_error) : '',
          }),
        };
      });
    }

    function groupedPhrases(sideRow) {
      const map = {};
      for (const item of sideRow.phrases) {
        const topic = item.topic || 'Others';
        const subtopic = item.subtopic || 'Others';
        if (!map[topic]) map[topic] = {};
        if (!map[topic][subtopic]) map[topic][subtopic] = [];
        map[topic][subtopic].push(item);
      }
      return map;
    }

    // ── Phrase filter expression parser ─────────────────────────────
    // Grammar:  expr = orExpr
    //           orExpr = andExpr ("|" andExpr)*
    //           andExpr = atom+
    //           atom = "!" atom | "(" expr ")" | quoted_token | token
    // Spaces are AND.  "|" is OR (needs content on both sides).
    // "!" negates the immediately following atom.
    // "quoted" = exact match (word boundaries); special chars inside are literal.

    // Returns AST node: { type: 'token'|'and'|'or'|'not', ... }  or null (empty)
    // Cached: only re-parsed when the raw string changes.

    let _filterCache = { raw: '', ast: null };

    function parseFilterExpr(raw) {
      const trimmed = String(raw || '').trim();
      if (!trimmed) return null;
      if (_filterCache.raw === trimmed) return _filterCache.ast;

      let ast;
      // Fast path 1: no special characters → single substring token
      if (!/[|!() "]/.test(trimmed)) {
        ast = { type: 'token', value: trimmed.toLowerCase(), exact: false };
      }
      // Fast path 2: no parentheses → split-based parse
      else if (!/[()]/.test(trimmed)) {
        ast = _parseSimple(trimmed);
      }
      // Full parse with parentheses
      else {
        ast = _parseFull(trimmed);
      }
      _filterCache = { raw: trimmed, ast };
      return ast;
    }

    function _parseSimple(raw) {
      // Tokenize first (handles quotes), then group by "|"
      const toks = _tokenizeSimple(raw);
      if (!toks.length) return null;
      // Split token list by "|" separators
      const groups = [[]];
      for (const tok of toks) {
        if (tok.type === 'sep' && tok.value === '|') {
          groups.push([]);
        } else {
          groups[groups.length - 1].push(tok);
        }
      }
      const orNodes = [];
      for (const group of groups) {
        const andNode = _buildAndFromTokens(group);
        if (andNode) orNodes.push(andNode);
      }
      if (!orNodes.length) return null;
      if (orNodes.length === 1) return orNodes[0];
      return { type: 'or', children: orNodes };
    }

    function _tokenizeSimple(raw) {
      // Returns array of { type:'word'|'quoted'|'neg'|'sep', value }
      const out = [];
      let i = 0;
      while (i < raw.length) {
        const ch = raw[i];
        if (/\s/.test(ch)) { i++; continue; }
        if (ch === '|') { out.push({ type: 'sep', value: '|' }); i++; continue; }
        if (ch === '"') {
          i++; // skip opening quote
          let content = '';
          while (i < raw.length && raw[i] !== '"') { content += raw[i]; i++; }
          if (i < raw.length) i++; // skip closing quote
          if (content) out.push({ type: 'quoted', value: content });
          continue;
        }
        if (ch === '!' && i + 1 < raw.length && !/[\s|]/.test(raw[i + 1])) {
          i++; // skip !
          // Check if next is a quoted token
          if (raw[i] === '"') {
            i++; // skip opening quote
            let content = '';
            while (i < raw.length && raw[i] !== '"') { content += raw[i]; i++; }
            if (i < raw.length) i++; // skip closing quote
            if (content) out.push({ type: 'neg', value: content, exact: true });
          } else {
            let word = '';
            while (i < raw.length && !/[\s|"!()]/.test(raw[i])) { word += raw[i]; i++; }
            if (word) out.push({ type: 'neg', value: word, exact: false });
          }
          continue;
        }
        // Plain word
        if (ch === '!') {
          // Bare "!" not followed by a token — skip it
          i++;
          continue;
        }
        let word = '';
        while (i < raw.length && !/[\s|"!()]/.test(raw[i])) { word += raw[i]; i++; }
        if (word) out.push({ type: 'word', value: word });
      }
      return out;
    }

    function _buildAndFromTokens(toks) {
      const nodes = [];
      for (const tok of toks) {
        if (tok.type === 'word') {
          nodes.push({ type: 'token', value: tok.value.toLowerCase(), exact: false });
        } else if (tok.type === 'quoted') {
          nodes.push({ type: 'token', value: tok.value.toLowerCase(), exact: true });
        } else if (tok.type === 'neg') {
          nodes.push({ type: 'not', child: { type: 'token', value: tok.value.toLowerCase(), exact: !!tok.exact } });
        }
        // skip 'sep'
      }
      if (!nodes.length) return null;
      if (nodes.length === 1) return nodes[0];
      return { type: 'and', children: nodes };
    }

    // Full recursive-descent parser (supports parentheses)
    function _parseFull(raw) {
      const tokens = _tokenize(raw);
      let pos = 0;

      function peek() { return tokens[pos] || null; }
      function consume() { return tokens[pos++]; }

      function parseOr() {
        const children = [parseAnd()];
        while (peek()?.value === '|' && peek()?.type === 'sep') {
          consume(); // eat "|"
          const right = parseAnd();
          if (right) children.push(right);
        }
        if (children.length === 1) return children[0];
        return children.filter(Boolean).length ? { type: 'or', children: children.filter(Boolean) } : null;
      }

      function parseAnd() {
        const children = [];
        while (peek() && !(peek().type === 'sep' && peek().value === '|') && !(peek().type === 'sep' && peek().value === ')')) {
          const before = pos;
          const node = parseAtom();
          if (node) children.push(node);
          if (pos === before) break; // safety: no progress
        }
        if (!children.length) return null;
        if (children.length === 1) return children[0];
        return { type: 'and', children };
      }

      function parseAtom() {
        const t = peek();
        if (!t) return null;
        if (t.type === 'sep' && t.value === '!') {
          consume();
          const child = parseAtom();
          return child ? { type: 'not', child } : null;
        }
        if (t.type === 'sep' && t.value === '(') {
          consume();
          const inner = parseOr();
          if (peek()?.type === 'sep' && peek()?.value === ')') consume();
          return inner;
        }
        if (t.type === 'word') {
          consume();
          return { type: 'token', value: t.value.toLowerCase(), exact: false };
        }
        if (t.type === 'quoted') {
          consume();
          return { type: 'token', value: t.value.toLowerCase(), exact: true };
        }
        // Skip unexpected tokens
        consume();
        return null;
      }

      const result = parseOr();
      return result;
    }

    function _tokenize(raw) {
      // Returns array of { type:'word'|'quoted'|'sep', value }
      const out = [];
      let i = 0;
      while (i < raw.length) {
        const ch = raw[i];
        if (/\s/.test(ch)) { i++; continue; }
        if (ch === '(' || ch === ')' || ch === '|' || ch === '!') {
          out.push({ type: 'sep', value: ch });
          i++;
          continue;
        }
        if (ch === '"') {
          i++; // skip opening quote
          let content = '';
          while (i < raw.length && raw[i] !== '"') { content += raw[i]; i++; }
          if (i < raw.length) i++; // skip closing quote
          if (content) out.push({ type: 'quoted', value: content });
          continue;
        }
        let word = '';
        while (i < raw.length && !/[\s()|!"']/.test(raw[i])) {
          word += raw[i];
          i++;
        }
        if (word) out.push({ type: 'word', value: word });
      }
      return out;
    }

    // Word-boundary regex cache for exact match tokens
    const _exactRegexCache = new Map();
    function _getExactRegex(value) {
      if (_exactRegexCache.has(value)) return _exactRegexCache.get(value);
      // Match the value surrounded by word boundaries (or string start/end)
      // Use \b for word boundary — works well for alphanumeric tokens
      const escaped = value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`(?:^|\\b|(?<=\\n))${escaped}(?:\\b|$|(?=\\n))`, 'i');
      _exactRegexCache.set(value, re);
      return re;
    }

    // Evaluate AST against a concatenated string of phrases
    function evalFilterExpr(ast, haystack) {
      if (!ast) return true;
      switch (ast.type) {
        case 'token':
          if (ast.exact) return _getExactRegex(ast.value).test(haystack);
          return haystack.includes(ast.value);
        case 'not': return !evalFilterExpr(ast.child, haystack);
        case 'and': return ast.children.every(c => evalFilterExpr(c, haystack));
        case 'or': return ast.children.some(c => evalFilterExpr(c, haystack));
        default: return true;
      }
    }

    function sideMatchesFilters(side, filters) {
      if (filters.complex !== 'all' && side.side !== filters.complex) return false;

      const hasTopicFilter = !!(filters.topic || filters.subtopic);
      const filterAst = parseFilterExpr(filters.phrase);
      const hasExprFilter = !!filterAst;

      if (!hasTopicFilter && !hasExprFilter) return true;

      // Collect phrases matching topic/subtopic filter
      const matchingPhrases = side.phrases.filter(p => {
        if (filters.topic && p.topic !== filters.topic) return false;
        if (filters.subtopic && p.subtopic !== filters.subtopic) return false;
        return true;
      });

      if (hasTopicFilter && !matchingPhrases.length) return false;
      if (!hasExprFilter) return true;

      // Build haystack from matching phrases (or all if no topic filter)
      const pool = hasTopicFilter ? matchingPhrases : side.phrases;
      const haystack = pool.map(p => String(p.phrase).toLowerCase()).join('\n');
      return evalFilterExpr(filterAst, haystack);
    }

    createApp({
      setup() {
        const topPanelRef = ref(null);
        const filterPanelRef = ref(null);
        const config = reactive({ ...DEFAULT_CONFIG });
        const filters = reactive({ complex: 'all', topic: '', subtopic: '', phrase: '', showPhrases: true });
        const state = reactive({
          loading: false,
          rowsLoaded: 0,
          loadGeneration: 0,   // FIX 1: generation counter to bust v-memo cache on reload
          pairs: [],
          status: '',
          statusType: 'info',
          selectedChip: null,
          selectedText: null,
          reasonSelection: null,
          reasonDrag: null,
          showConfig: false,
          showHelp: false,
          imageModal: {
            open: false,
            url: '',
            name: '',
          },
          contextMenu: {
            open: false,
            x: 0,
            y: 0,
            pairId: null,
            side: null,
            kind: '',
            phraseId: null,
            text: '',
            activeTopic: '',
          },
          addDialog: {
            open: false,
            pairId: null,
            side: null,
            phrase: '',
            topic: '',
            subtopic: '',
            topicLocked: false,
            sourceChip: null,
          },
          copiedPhraseKey: '',
          searchIndex: -1,
          filterHidden: false,
          filterFloating: false,
          filterHeight: 0,
          draggedChip: null,
          draggingChipId: null,
          editingChipId: null,
          lastScrollY: 0,
          _scrollRaf: 0,
          // OAuth & Save
          oauthToken: null,
          oauthUser: '',
          saving: false,
          saveConfirmOpen: false,
          sheetHeaders: [],   // column headers from loaded sheet
          sheetName: '',      // resolved sheet tab name
        });

        function setStatus(msg, type = 'info') {
          state.status = msg;
          state.statusType = type;
        }

        function flashCopiedPhraseKey(key) {
          state.copiedPhraseKey = key;
          window.clearTimeout(state._copiedPhraseTimer);
          state._copiedPhraseTimer = window.setTimeout(() => {
            if (state.copiedPhraseKey === key) state.copiedPhraseKey = '';
          }, 1000);
        }

        function updateFloatingLayout() {
          const topEl = topPanelRef.value;
          const filterEl = filterPanelRef.value;
          if (filterEl) state.filterHeight = filterEl.offsetHeight || 0;
          if (!topEl) {
            state.filterFloating = false;
            state.filterHidden = false;
            return;
          }
          const panelBottom = topEl.getBoundingClientRect().bottom;
          const shouldFloat = state.filterFloating ? (panelBottom <= 8) : (panelBottom <= -8);
          state.filterFloating = shouldFloat;
          if (!shouldFloat) state.filterHidden = false;
        }

        function applyWindowScroll() {
          const y = window.scrollY || 0;
          updateFloatingLayout();
          if (!state.filterFloating) {
            state.lastScrollY = y;
            state._scrollRaf = 0;
            return;
          }
          if (y < 32) state.filterHidden = false;
          else if (y > state.lastScrollY + 10 && !state._suppressFilterHide) state.filterHidden = true;
          else if (y < state.lastScrollY - 10) state.filterHidden = false;
          state.lastScrollY = y;
          state._scrollRaf = 0;
        }

        function handleWindowScroll() {
          if (state._scrollRaf) return;
          state._scrollRaf = window.requestAnimationFrame(applyWindowScroll);
        }

        let _nearTopThrottle = 0;
        function handleMouseNearTop(e) {
          if (_nearTopThrottle) return;
          _nearTopThrottle = 1;
          setTimeout(() => { _nearTopThrottle = 0; }, 100);
          if ((e?.clientY || 9999) <= 72) state.filterHidden = false;
        }

        function handleWindowResize() {
          updateFloatingLayout();
        }

        const filterTopics = computed(() => Object.keys(TOPIC_META));

        const filterSubtopics = computed(() => {
          if (filters.topic && TOPIC_META[filters.topic]) return [...TOPIC_META[filters.topic]];
          return Array.from(new Set(Object.values(TOPIC_META).flat()));
        });

        const addDialogTopicOptionsList = computed(() => {
          const d = state.addDialog;
          const sideRow = getSide(d.pairId, d.side);
          if (!sideRow) return [];
          return findMissingTopics(sideRow);
        });

        const addDialogSubtopicOptionsList = computed(() => {
          const d = state.addDialog;
          const sideRow = getSide(d.pairId, d.side);
          if (!sideRow || !d.topic) return [];
          return findMissingSubtopics(sideRow, d.topic);
        });

        const filteredPairs = computed(() => {
          // Touch loadGeneration so filteredPairs recomputes on reload
          const _gen = state.loadGeneration;
          return state.pairs
            .map(pair => {
              const showMore = sideMatchesFilters(pair.more, filters);
              const showLess = sideMatchesFilters(pair.less, filters);
              if (!showMore && !showLess) return null;
              return { pair, showMore, showLess };
            })
            .filter(Boolean);
        });

        const contextMenuSubtopics = computed(() => {
          const topic = state.contextMenu.activeTopic;
          return topic ? [...(TOPIC_META[topic] || ['Others'])] : [];
        });

        // ── Search navigation (find-like x/N + Enter to jump) ────────
        // Extract positive (non-negated) leaf tokens from AST
        function _collectPositiveTokens(ast) {
          if (!ast) return [];
          switch (ast.type) {
            case 'token': return [ast];
            case 'not': return []; // negated tokens are not "search targets"
            case 'and':
            case 'or':
              return ast.children.flatMap(c => _collectPositiveTokens(c));
            default: return [];
          }
        }

        function _phraseMatchesAnyToken(phraseText, tokens) {
          const lower = String(phraseText || '').toLowerCase();
          return tokens.some(tok => {
            if (tok.exact) return _getExactRegex(tok.value).test(lower);
            return lower.includes(tok.value);
          });
        }

        // Flat list of all matching phrases in display order: [{pairId, side, phraseId}, ...]
        const searchMatches = computed(() => {
          const ast = parseFilterExpr(filters.phrase);
          if (!ast) return [];
          const tokens = _collectPositiveTokens(ast);
          if (!tokens.length) return [];
          const out = [];
          for (const item of filteredPairs.value) {
            const pair = item.pair;
            for (const sideKey of ['more', 'less']) {
              if (sideKey === 'more' && !item.showMore) continue;
              if (sideKey === 'less' && !item.showLess) continue;
              const sideRow = pair[sideKey];
              // Respect topic/subtopic filters
              for (const p of sideRow.phrases) {
                if (filters.topic && p.topic !== filters.topic) continue;
                if (filters.subtopic && p.subtopic !== filters.subtopic) continue;
                if (_phraseMatchesAnyToken(p.phrase, tokens)) {
                  out.push({ pairId: pair.pairId, side: sideKey, phraseId: p.id });
                }
              }
            }
          }
          return out;
        });

        const searchTotal = computed(() => searchMatches.value.length);

        // searchIndex: -1 means no active navigation yet, 0..N-1 = current match
        // Reset to -1 when filter text or matches change
        watch(() => filters.phrase, () => { state.searchIndex = -1; });
        watch(searchTotal, () => {
          if (state.searchIndex >= searchTotal.value) state.searchIndex = -1;
        });

        const searchDisplayIndex = computed(() => {
          if (state.searchIndex < 0 || !searchTotal.value) return 0;
          return state.searchIndex + 1;
        });

        function isSearchHighlighted(pairId, side, phraseId) {
          if (state.searchIndex < 0) return false;
          const match = searchMatches.value[state.searchIndex];
          return match && match.pairId === pairId && match.side === side && match.phraseId === phraseId;
        }

        function _scrollToChip(pairId, side, phraseId) {
          nextTick(() => {
            let target = null;

            // scroll to phrase span in reason box first
            const reasonBox = getReasonBoxEl(pairId, side);
            if (reasonBox) target = reasonBox.querySelector(`.reason-phrase[data-phrase-id="${CSS.escape(phraseId)}"]`);

            // fall back to chip if no reason phrase found (can happen if the chip is falsey-extracted or manually modified)
            if (!target) {
              const sideKey = `${pairId}__${side}`;
              const sideEl = document.querySelector(`[data-side-key="${CSS.escape(sideKey)}"]`);
              if (sideEl) target = sideEl.querySelector(`.chip[data-phrase-id="${CSS.escape(phraseId)}"]`);
            }

            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          });
        }

        function navigateSearch(delta) {
          const total = searchTotal.value;
          if (!total) return;
          let next;
          if (state.searchIndex < 0) {
            next = delta > 0 ? 0 : total - 1;
          } else {
            next = (state.searchIndex + delta + total) % total;
          }
          state.searchIndex = next;
          const match = searchMatches.value[next];
          if (match) {
            selectPhrase(match.pairId, match.side, match.phraseId, null);
            state.filterHidden = false;
            state._suppressFilterHide = true;
            _scrollToChip(match.pairId, match.side, match.phraseId);
            // Allow scroll-hide again after the smooth scroll settles
            clearTimeout(state._suppressFilterHideTimer);
            state._suppressFilterHideTimer = setTimeout(() => { state._suppressFilterHide = false; }, 600);
          }
        }

        function onSearchKeydown(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            navigateSearch(e.shiftKey ? -1 : 1);
          }
        }

        function clearNativeSelection() {
          const sel = window.getSelection?.();
          if (sel && sel.rangeCount) sel.removeAllRanges();
        }

        function clearTextSelection(removeNative = false) {
          state.selectedText = null;
          if (removeNative) clearNativeSelection();
        }

        function closeContextMenu() {
          state.contextMenu.open = false;
          state.contextMenu.kind = '';
          state.contextMenu.pairId = null;
          state.contextMenu.side = null;
          state.contextMenu.phraseId = null;
          state.contextMenu.text = '';
          state.contextMenu.activeTopic = '';
        }

        function clearPhraseSelection() {
          state.selectedChip = null;
          state.reasonSelection = null;
        }

        let _selChangeRaf = 0;
        function handleSelectionChange() {
          if (_selChangeRaf) return;
          _selChangeRaf = window.requestAnimationFrame(() => {
            _selChangeRaf = 0;
            const txt = String(window.getSelection?.()?.toString?.() || '').trim();
            if (!txt) state.selectedText = null;
          });
        }

        function handleDocumentMouseUp() {
          setTimeout(() => {
            const txt = String(window.getSelection?.()?.toString?.() || '').trim();
            if (!txt) state.selectedText = null;
          }, 0);
        }

        function openConfig() { state.showConfig = true; }
        function closeConfig() { state.showConfig = false; }
        function openHelp() { state.showHelp = true; }
        function closeHelp() { state.showHelp = false; }

        const _pairMap = new Map();
        function _rebuildPairMap() {
          _pairMap.clear();
          for (const p of state.pairs) _pairMap.set(p.pairId, p);
        }

        function getPair(pairId) {
          return _pairMap.get(pairId) || state.pairs.find(p => p.pairId === pairId) || null;
        }

        function getSide(pairId, side) {
          const pair = getPair(pairId);
          if (!pair) return null;
          return side === 'more' ? pair.more : pair.less;
        }

        function getReasonBoxSelector(pairId, side) {
          return `[data-reason-box="${CSS.escape(`${pairId}__${side}`)}"]`;
        }

        function getReasonBoxEl(pairId, side) {
          return document.querySelector(getReasonBoxSelector(pairId, side));
        }

        function selectPhrase(pairId, side, phraseId, reasonSelection = null) {
          state.selectedChip = { pairId, side, phraseId };
          state.reasonSelection = reasonSelection;
        }

        function selectPhraseOccurrenceByRange(pairId, side, phraseId, start, end) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return;
          const match = buildReasonLayout(sideRow).matches.find(m => m.phraseId === phraseId && m.start === start && m.end === end);
          selectPhrase(pairId, side, phraseId, match ? {
            pairId,
            side,
            phraseId,
            occurrenceIndex: match.occurrenceIndex,
            start: match.start,
            end: match.end,
          } : null);
        }

        function isSelectedChip(pairId, side, phraseId) {
          return !!state.selectedChip && state.selectedChip.pairId === pairId && state.selectedChip.side === side && state.selectedChip.phraseId === phraseId;
        }

        function removePhraseById(pairId, side, phraseId, setMessage = true) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return false;
          const idx = sideRow.phrases.findIndex(p => p.id === phraseId);
          if (idx === -1) return false;
          const removed = { ...sideRow.phrases[idx] };
          const removedIndex = idx;
          sideRow.phrases.splice(idx, 1);
          bumpSidePhraseVersion(sideRow);
          if (state.selectedChip && state.selectedChip.pairId === pairId && state.selectedChip.side === side && state.selectedChip.phraseId === phraseId) {
            clearPhraseSelection();
          }
          // Clear non-reactive hover state
          const hKey = `${pairId}__${side}`;
          if (_hoverMap.get(hKey) === phraseId) _hoverMap.delete(hKey);
          if (setMessage) setStatus('Phrase deleted.', 'good');
          // Record undo
          pushUndo({
            type: 'delete',
            description: `Deleted "${_truncate(removed.phrase)}"`,
            focusPairId: pairId,
            focusSide: side,
            focusPhraseId: removed.id,
            undo() {
              const sr = getSide(pairId, side);
              if (!sr) return;
              const restored = { ...removed, editing: false, selected: false };
              sr.phrases.splice(Math.min(removedIndex, sr.phrases.length), 0, restored);
              bumpSidePhraseVersion(sr);
            },
            redo() {
              removePhraseById_noUndo(pairId, side, removed.id);
            },
            redoFocusPairId: null,
            redoFocusSide: null,
            redoFocusPhraseId: null,
          });
          return true;
        }

        // Internal version that doesn't push to undo stack (used for redo)
        function removePhraseById_noUndo(pairId, side, phraseId) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return false;
          const idx = sideRow.phrases.findIndex(p => p.id === phraseId);
          if (idx === -1) return false;
          sideRow.phrases.splice(idx, 1);
          bumpSidePhraseVersion(sideRow);
          if (state.selectedChip && state.selectedChip.pairId === pairId && state.selectedChip.side === side && state.selectedChip.phraseId === phraseId) {
            clearPhraseSelection();
          }
          const hKey = `${pairId}__${side}`;
          if (_hoverMap.get(hKey) === phraseId) _hoverMap.delete(hKey);
          return true;
        }

        function deleteSelectedPhrase() {
          if (!state.selectedChip) return;
          removePhraseById(state.selectedChip.pairId, state.selectedChip.side, state.selectedChip.phraseId, true);
        }

        // ── Undo / Redo execution ──────────────────────────────────
        function _focusPhrase(pairId, side, phraseId) {
          nextTick(() => {
            _scrollToChip(pairId, side, phraseId);
            selectPhrase(pairId, side, phraseId, null);
          });
        }

        function performUndo() {
          if (!canUndo()) return;
          const action = _undoStack.pop();
          _redoStack.push(action);
          action.undo();
          showUndoToast('Undo:', action.description);
          if (action.focusPairId && action.focusSide && action.focusPhraseId) {
            _focusPhrase(action.focusPairId, action.focusSide, action.focusPhraseId);
          }
        }

        function performRedo() {
          if (!canRedo()) return;
          const action = _redoStack.pop();
          _undoStack.push(action);
          action.redo();
          showUndoToast('Redo:', action.description);
          if (action.redoFocusPairId && action.redoFocusSide && action.redoFocusPhraseId) {
            _focusPhrase(action.redoFocusPairId, action.redoFocusSide, action.redoFocusPhraseId);
          } else if (action.focusPairId && action.focusSide && action.focusPhraseId) {
            _focusPhrase(action.focusPairId, action.focusSide, action.focusPhraseId);
          }
        }

        function handleGlobalKeydown(e) {
          const tag = document.activeElement?.tagName?.toLowerCase();
          const isTyping = ['input', 'textarea', 'select'].includes(tag);
          if (e.key === 'Escape') {
            if (state.contextMenu.open) {
              closeContextMenu();
              return;
            }
          }
          // Undo/Redo: Ctrl+Z / Ctrl+Shift+Z (or Cmd on Mac)
          if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z') && !e.altKey) {
            e.preventDefault();
            if (e.shiftKey) performRedo();
            else performUndo();
            return;
          }
          if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || e.key === 'Y') && !e.altKey && !e.shiftKey) {
            e.preventDefault();
            performRedo();
            return;
          }
          if (isTyping) return;
          if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedChip) {
            e.preventDefault();
            deleteSelectedPhrase();
          }
        }

        function beginEditChip(pairId, side, phraseId) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return;
          closeContextMenu();
          for (const phrase of sideRow.phrases) {
            phrase.editing = phrase.id === phraseId;
            if (phrase.editing) phrase._draft = phrase.phrase;
          }
          state.editingChipId = phraseId;
          selectPhrase(pairId, side, phraseId, null);
          nextTick(() => {
            const el = document.querySelector(`[data-chip-input="${phraseId}"]`);
            if (el) el.focus();
          });
        }

        // FIX 2: Guard against double-fire (enter triggers save → editing=false → input removed → blur fires save again)
        function saveEditChip(pairId, side, phraseId, save = true) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return;
          const phrase = findPhraseById(sideRow, phraseId);
          if (!phrase) return;
          // If already not editing, this is a duplicate call (e.g. blur after enter) — skip
          if (!phrase.editing) return;
          if (save) {
            const next = String(phrase._draft ?? phrase.phrase ?? '').trim();
            if (!next) {
              setStatus('Phrase cannot be empty.', 'warn');
              return;
            }
            if (next !== phrase.phrase) {
              const oldPhrase = phrase.phrase;
              const existing = findPhraseByText(sideRow, next, phrase.id);
              if (existing) {
                if (existing.topic === phrase.topic && existing.subtopic === phrase.subtopic) {
                  // Merge: remove current, keep existing
                  const removedSnapshot = { ...phrase, editing: false, selected: false };
                  const removedIdx = sideRow.phrases.findIndex(p => p.id === phrase.id);
                  phrase.editing = false;
                  state.editingChipId = null;
                  delete phrase._draft;
                  // Use noUndo version since we push a custom undo action
                  removePhraseById_noUndo(pairId, side, phrase.id);
                  selectPhrase(pairId, side, existing.id, null);
                  setStatus('Merged with the existing phrase.', 'good');
                  pushUndo({
                    type: 'edit-merge',
                    description: `Merged "${_truncate(oldPhrase)}" → "${_truncate(next)}"`,
                    focusPairId: pairId,
                    focusSide: side,
                    focusPhraseId: removedSnapshot.id,
                    undo() {
                      const sr = getSide(pairId, side);
                      if (!sr) return;
                      const restored = { ...removedSnapshot };
                      delete restored._draft;
                      sr.phrases.splice(Math.min(removedIdx, sr.phrases.length), 0, restored);
                      bumpSidePhraseVersion(sr);
                    },
                    redo() {
                      removePhraseById_noUndo(pairId, side, removedSnapshot.id);
                    },
                    redoFocusPairId: pairId,
                    redoFocusSide: side,
                    redoFocusPhraseId: existing.id,
                  });
                  return;
                }
                setStatus('That phrase already exists under a different topic/subtopic. Reclassify it instead.', 'warn');
                return;
              }
              phrase.phrase = next;
              phrase.modified = true;
              bumpSidePhraseVersion(sideRow);
              if (!phraseInReason(next, sideRow.reason)) setStatus('Edited phrase is not found in the reason text.', 'warn');
              else setStatus('Phrase edited.', 'good');
              pushUndo({
                type: 'edit',
                description: `Edited "${_truncate(oldPhrase)}" → "${_truncate(next)}"`,
                focusPairId: pairId,
                focusSide: side,
                focusPhraseId: phraseId,
                undo() {
                  const sr = getSide(pairId, side);
                  if (!sr) return;
                  const p = findPhraseById(sr, phraseId);
                  if (p) { p.phrase = oldPhrase; p.modified = true; bumpSidePhraseVersion(sr); }
                },
                redo() {
                  const sr = getSide(pairId, side);
                  if (!sr) return;
                  const p = findPhraseById(sr, phraseId);
                  if (p) { p.phrase = next; p.modified = true; bumpSidePhraseVersion(sr); }
                },
              });
            }
          }
          phrase.editing = false;
          state.editingChipId = null;
          delete phrase._draft;
        }

        function onReasonMouseUp(pairId, side) {
          const sel = window.getSelection();
          const text = String(sel?.toString() || '').trim();
          if (!text) {
            clearTextSelection();
            return;
          }
          const sideRow = getSide(pairId, side);
          if (!sideRow || !sideRow.reason.includes(text)) {
            clearTextSelection();
            return;
          }
          state.selectedText = { pairId, side, text };
          setStatus('Selected text ready. Drag it, or right-click to classify it.', 'good');
        }

        function selectionAllowed(pairId, side) {
          return state.selectedText && state.selectedText.pairId === pairId && state.selectedText.side === side;
        }

        function chipDragAllowed(pairId, side) {
          return state.draggedChip && state.draggedChip.pairId === pairId && state.draggedChip.side === side;
        }

        function addAllowed(pairId, side) {
          return selectionAllowed(pairId, side) || chipDragAllowed(pairId, side);
        }

        // ── Fully non-reactive hover system ──────────────────────────────
        const _hoverMap = new Map(); // "pairId__side" → phraseId

        function _applyHoverDom(pairId, side, phraseId) {
          const sideKey = `${pairId}__${side}`;
          const reasonBox = getReasonBoxEl(pairId, side);
          if (reasonBox) {
            const old = reasonBox.querySelectorAll('.reason-phrase.is-hovered');
            for (let i = 0; i < old.length; i++) old[i].classList.remove('is-hovered');
            if (phraseId) {
              const els = reasonBox.querySelectorAll(`.reason-phrase[data-phrase-id="${CSS.escape(phraseId)}"]`);
              for (let i = 0; i < els.length; i++) els[i].classList.add('is-hovered');
            }
          }
          const sideRowEl = document.querySelector(`[data-side-key="${CSS.escape(sideKey)}"]`);
          if (sideRowEl) {
            const old = sideRowEl.querySelectorAll('.chip.hovered');
            for (let i = 0; i < old.length; i++) old[i].classList.remove('hovered');
            if (phraseId) {
              const els = sideRowEl.querySelectorAll(`.chip[data-phrase-id="${CSS.escape(phraseId)}"]`);
              for (let i = 0; i < els.length; i++) {
                if (!els[i].classList.contains('selected')) els[i].classList.add('hovered');
              }
            }
          }
        }

        function hoverPhrase(pairId, side, phraseId) {
          _hidePhraseTooltip();
          const key = `${pairId}__${side}`;
          if (_hoverMap.get(key) === phraseId) return;
          _hoverMap.set(key, phraseId);
          _applyHoverDom(pairId, side, phraseId);
        }

        function leavePhrase(pairId, side, phraseId) {
          const key = `${pairId}__${side}`;
          if (_hoverMap.get(key) !== phraseId) return;
          _hoverMap.delete(key);
          _applyHoverDom(pairId, side, null);
        }

        function _clearHoverForSide(pairId, side) {
          const key = `${pairId}__${side}`;
          const old = _hoverMap.get(key);
          if (old) {
            _hoverMap.delete(key);
            _applyHoverDom(pairId, side, null);
          }
        }

        // ── Phrase tooltip (non-reactive, pure DOM) ──────────────────────
        let _tooltipEl = null;
        let _tooltipVisible = false;
        let _tooltipRaf = 0;

        function _ensureTooltip() {
          if (_tooltipEl) return _tooltipEl;
          _tooltipEl = document.createElement('div');
          _tooltipEl.className = 'phrase-tooltip';
          document.body.appendChild(_tooltipEl);
          return _tooltipEl;
        }

        function _showPhraseTooltip(phraseEl, mouseX, mouseY) {
          const topic = phraseEl.dataset?.topic;
          const subtopic = phraseEl.dataset?.subtopic;
          if (!topic) { _hidePhraseTooltip(); return; }
          const tt = _ensureTooltip();
          tt.innerHTML = `<span class="tt-topic">${escapeHtml(topic)}</span><span class="tt-sep">›</span><span class="tt-sub">${escapeHtml(subtopic || 'Others')}</span>`;
          tt.style.left = '0px';
          tt.style.top = '0px';
          tt.classList.add('visible');
          _tooltipVisible = true;
          if (_tooltipRaf) cancelAnimationFrame(_tooltipRaf);
          _tooltipRaf = requestAnimationFrame(() => {
            _tooltipRaf = 0;
            if (!_tooltipVisible) return;
            const ttRect = tt.getBoundingClientRect();
            let top = mouseY - ttRect.height - 20;
            if (top < 4) top = mouseY + 18;
            let left = mouseX - ttRect.width / 2;
            left = Math.max(4, Math.min(left, window.innerWidth - ttRect.width - 4));
            tt.style.left = `${left}px`;
            tt.style.top = `${top}px`;
          });
        }

        function _hidePhraseTooltip() {
          if (!_tooltipVisible) return;
          _tooltipVisible = false;
          if (_tooltipEl) _tooltipEl.classList.remove('visible');
          if (_tooltipRaf) { cancelAnimationFrame(_tooltipRaf); _tooltipRaf = 0; }
        }

        // ── Inline info tooltip (FIX 3) ──────────────────────────────────
        let _infoTipEl = null;
        let _infoTipAnchor = null; // the button element that opened the current tooltip

        function _ensureInfoTip() {
          if (_infoTipEl) return _infoTipEl;
          _infoTipEl = document.createElement('div');
          _infoTipEl.className = 'info-tooltip';
          _infoTipEl.style.display = 'none';
          document.body.appendChild(_infoTipEl);
          return _infoTipEl;
        }

        function _positionInfoTip(anchorEl) {
          const el = _infoTipEl;
          if (!el || !anchorEl) return;
          const btnRect = anchorEl.getBoundingClientRect();
          requestAnimationFrame(() => {
            const tipRect = el.getBoundingClientRect();
            let top = btnRect.bottom + 6;
            if (top + tipRect.height > window.innerHeight - 8) {
              top = btnRect.top - tipRect.height - 6;
            }
            let left = btnRect.left + btnRect.width / 2 - tipRect.width / 2;
            left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));
            el.style.left = `${left}px`;
            el.style.top = `${top}px`;
          });
        }

        function _openInfoTipWithHtml(html, anchorEl) {
          const el = _ensureInfoTip();
          // Toggle: if clicking the same anchor that's already open, close it
          if (el.style.display !== 'none' && _infoTipAnchor === anchorEl) {
            hideInfoTip();
            return;
          }
          el.innerHTML = html;
          el.style.display = 'block';
          _infoTipAnchor = anchorEl;
          _positionInfoTip(anchorEl);
          // Close on next outside click (but not the current click)
          setTimeout(() => {
            document.addEventListener('mousedown', _infoTipOutsideClick, { once: true });
          }, 0);
        }

        function showInfoTip(topic, subtopic, e) {
          e.stopPropagation();
          e.preventDefault();
          const topicData = HELP_LOOKUP[topic];
          let html = '';
          if (subtopic && topicData?.subtopics?.[subtopic]) {
            const sub = topicData.subtopics[subtopic];
            html = `<div class="info-tt-title">${escapeHtml(subtopic)}</div>`;
            html += `<p class="info-tt-def">${escapeHtml(sub.definition)}</p>`;
            if (sub.examples) html += `<div class="info-tt-examples"><strong>Examples:</strong> ${escapeHtml(sub.examples)}</div>`;
          } else if (topicData) {
            html = `<div class="info-tt-title">${escapeHtml(topic)}</div>`;
            html += `<p class="info-tt-def">${escapeHtml(topicData.definition)}</p>`;
          } else {
            html = `<div class="info-tt-title">${escapeHtml(topic)}</div><p class="info-tt-def">No definition available.</p>`;
          }
          _openInfoTipWithHtml(html, e.currentTarget);
        }

        function showSearchHelpTip(e) {
          e.stopPropagation();
          e.preventDefault();
          const html = `<div class="info-tt-title">Search Syntax</div>
<p class="info-tt-def" style="margin-bottom:6px;">Filter pairs by phrase text. Expressions are matched against all phrases in a row (scoped by Topic/Subtopic filters if set).</p>
<div class="info-tt-examples">
<strong>space</strong> = AND &nbsp; <code>simple text</code> → both must appear<br>
<strong>|</strong> = OR &nbsp; <code>color | shape</code> → either suffices<br>
<strong>!</strong> = NOT &nbsp; <code>!overlap color</code> → has "color" but not "overlap"<br>
<strong>"…"</strong> = exact &nbsp; <code>"simple"</code> → won't match "simpler"<br>
<strong>( )</strong> = grouping &nbsp; <code>(red | blue) !dark</code><br>

        function upsertPhrase(pairId, side, topic, subtopic, phraseText, options = {}) {
          const sideRow = getSide(pairId, side);
          if (!sideRow) return null;
          const text = String(phraseText || '').trim();
          if (!text || !topic || !subtopic) return null;

          const existing = findPhraseByText(sideRow, text, options.excludeId || null);
          if (existing) {
            const moved = existing.topic !== topic || existing.subtopic !== subtopic;
            const oldTopic = existing.topic;
            const oldSubtopic = existing.subtopic;
            existing.topic = topic;
            existing.subtopic = subtopic;
            existing.modified = true;
            if (moved) bumpSidePhraseVersion(sideRow);
            if (!options.silentSelect) selectPhrase(pairId, side, existing.id, null);
            if (!options.suppressStatus) {
              if (moved) setStatus('Existing phrase reclassified.', 'good');
              else setStatus('Phrase already exists.', 'info');
            }
            if (moved && !options._noUndo) {
              pushUndo({
                type: 'reclassify',
                description: `Reclassified "${_truncate(text)}" → ${_truncate(subtopic, 20)}`,
                focusPairId: pairId,
                focusSide: side,
                focusPhraseId: existing.id,
                undo() {
                  const sr = getSide(pairId, side);
                  if (!sr) return;
                  const p = findPhraseById(sr, existing.id);
                  if (p) { p.topic = oldTopic; p.subtopic = oldSubtopic; p.modified = true; bumpSidePhraseVersion(sr); }
                },
                redo() {
                  const sr = getSide(pairId, side);
                  if (!sr) return;
                  const p = findPhraseById(sr, existing.id);
                  if (p) { p.topic = topic; p.subtopic = subtopic; p.modified = true; bumpSidePhraseVersion(sr); }
                },
              });
            }
            return existing;
          }

          const phrase = {
            id: uid(),
            phrase: text,
            topic,
            subtopic,
            editing: false,
            selected: false,
            modified: true,
          };
          sideRow.phrases.push(phrase);
          bumpSidePhraseVersion(sideRow);
          if (!options.silentSelect) selectPhrase(pairId, side, phrase.id, null);
          if (!options.suppressStatus) {
            if (!phraseInReason(text, sideRow.reason)) setStatus('Added phrase, but it is not found in the reason text.', 'warn');
            else setStatus('Phrase added.', 'good');
          }
          if (!options._noUndo) {
            pushUndo({
              type: 'add',
              description: `Added "${_truncate(text)}"`,
              focusPairId: pairId,
              focusSide: side,
              focusPhraseId: phrase.id,
              undo() {
                removePhraseById_noUndo(pairId, side, phrase.id);
              },
              redo() {

              redoFocusSide: side,
              redoFocusPhraseId: phrase.id,

        function movePhraseToSubtopic(fromPairId, fromSide, phraseId, toPairId, toSide, topic, subtopic) {

          phrase.subtopic = subtopic;
          phrase.modified = true;

        function applyReasonBoundaryChange(drag) {
          const sideRow = getSide(drag.pairId, drag.side);
          const phrase = findPhraseById(sideRow, drag.phraseId);
          if (!sideRow || !phrase) return;
          const range = trimRangeToContent(sideRow.reason, drag.previewStart, drag.previewEnd);
          const nextText = String(sideRow.reason.slice(range.start, range.end) || '').trim();
          if (!nextText) {
            setStatus('Phrase cannot be empty after resizing.', 'warn');
            return;
          }
          if (nextText === phrase.phrase) {
            selectPhraseOccurrenceByRange(drag.pairId, drag.side, drag.phraseId, drag.anchorStart, drag.anchorEnd);
            return;
          }

          const oldText = phrase.phrase;
          const visibleCount = drag.visibleCount;
          const existing = findPhraseByText(sideRow, nextText, phrase.id);
          if (visibleCount <= 1) {
            if (existing) {
              // Resize merges into existing — record combined undo
              const removedSnapshot = { ...phrase, editing: false, selected: false };
              const removedIdx = sideRow.phrases.findIndex(p => p.id === phrase.id);
              removePhraseById_noUndo(drag.pairId, drag.side, phrase.id);
              selectPhraseOccurrenceByRange(drag.pairId, drag.side, existing.id, range.start, range.end);
              setStatus('Phrase resized by reusing the existing phrase.', 'good');
              pushUndo({
                type: 'resize-merge',
                description: `Resized "${_truncate(oldText)}" → merged`,
                focusPairId: drag.pairId,
                focusSide: drag.side,
                focusPhraseId: removedSnapshot.id,
                undo() {
                  const sr = getSide(drag.pairId, drag.side);
                  if (!sr) return;
